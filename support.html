<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Support & Chat – Aquanics</title>
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── SUPPORT PAGE ──────────────────────────────── */
.support-wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 32px 20px 80px;
}
.support-header {
  margin-bottom: 28px;
}
.support-header h1 {
  font-family: var(--R);
  font-size: 26px; font-weight: 800;
  color: var(--ocean); margin-bottom: 6px;
}
.support-header p { font-size: 14px; color: var(--g3); }

/* Push notification bar */
.push-bar {
  background: linear-gradient(135deg, #062035, #0a2d4a);
  border-radius: 14px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 24px;
  border: 1px solid rgba(0,212,170,.2);
}
.push-bar-text { flex: 1; }
.push-bar-text strong { display:block; font-size:14px; color:#fff; margin-bottom:3px; }
.push-bar-text span  { font-size:12.5px; color:rgba(255,255,255,.5); }
.push-btn {
  background: var(--teal); color: var(--ocean);
  border: none; padding: 9px 18px; border-radius: 9px;
  font-size: 13px; font-weight: 700; font-family: var(--B);
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  flex-shrink: 0;
}
.push-btn:hover { background: var(--teal2); }
.push-btn.enabled { background: rgba(0,212,170,.15); color:var(--teal); cursor:default; }

/* New thread form */
.new-thread-card {
  background: #fff;
  border-radius: 18px;
  padding: 24px;
  box-shadow: 0 2px 16px rgba(0,168,130,.08);
  margin-bottom: 24px;
  border: 1.5px solid var(--g1);
}
.new-thread-card h3 {
  font-family: var(--R); font-size:16px; font-weight:700;
  margin-bottom: 16px; color: var(--ocean);
  display: flex; align-items:center; gap: 8px;
}
.subject-input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--g2);
  border-radius: 10px;
  font-size: 14px;
  font-family: var(--B);
  outline: none;
  margin-bottom: 10px;
  transition: border-color .2s;
}
.subject-input:focus { border-color: var(--teal); }
.msg-textarea {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--g2); border-radius: 10px;
  font-size: 14px; font-family: var(--B);
  resize: vertical; min-height: 80px; outline: none;
  transition: border-color .2s; margin-bottom: 10px;
}
.msg-textarea:focus { border-color: var(--teal); }

/* Thread list */
.thread-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
.thread-card {
  background: #fff;
  border-radius: 16px;
  padding: 18px 20px;
  cursor: pointer;
  border: 1.5px solid var(--g1);
  transition: all .25s var(--ease);
  display: flex; align-items: center; gap: 14px;
}
.thread-card:hover { border-color: var(--teal); box-shadow: 0 4px 20px rgba(0,168,130,.1); transform: translateX(3px); }
.thread-card.active { border-color: var(--teal); background: #f0fbf8; }
.thread-card.has-unread { border-color: var(--gold); }
.thread-icon {
  width: 46px; height: 46px; border-radius: 14px;
  background: linear-gradient(135deg, var(--teal3), var(--teal2));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.thread-icon.media { background: linear-gradient(135deg, #1a4060, #0a2d4a); }
.thread-info { flex: 1; min-width: 0; }
.thread-subject {
  font-weight: 700; font-size: 14px; color: var(--ocean);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 3px;
}
.thread-preview { font-size: 12.5px; color: var(--g3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.thread-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.thread-time { font-size: 11px; color: var(--g3); }
.thread-badge {
  background: var(--gold); color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 10px;
}
.status-chip {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
}
.status-open { background:#e6faf5; color:#007a60; }
.status-in_progress { background:#fff8e6; color:#b8860b; }
.status-resolved,.status-closed { background:var(--g1); color:var(--g3); }

/* Chat window */
.chat-window {
  background: #fff;
  border-radius: 20px;
  border: 1.5px solid var(--g1);
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,168,130,.08);
  display: none;
}
.chat-window.open { display: flex; flex-direction: column; }
.chat-header {
  padding: 16px 20px;
  background: linear-gradient(135deg, var(--ocean2), var(--ocean3));
  display: flex; align-items: center; gap: 12px;
}
.chat-header-icon {
  width: 40px; height: 40px; border-radius: 12px;
  background: rgba(0,212,170,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.chat-header-info { flex: 1; min-width: 0; }
.chat-header-subject { font-weight: 700; font-size: 14px; color: #fff; }
.chat-header-status { font-size: 12px; color: rgba(255,255,255,.5); }
.chat-close { background:none; border:none; color:rgba(255,255,255,.5); font-size:20px; cursor:pointer; padding:4px; }
.chat-close:hover { color:#fff; }

.chat-messages {
  flex: 1;
  min-height: 320px;
  max-height: 440px;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--g2); border-radius: 2px; }

/* Messages */
.msg { display:flex; gap:10px; max-width:80%; }
.msg.from-admin { align-self: flex-start; }
.msg.from-user  { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--g1); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; overflow: hidden;
}
.msg-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.msg-bubble {
  padding: 11px 14px; border-radius: 16px; font-size: 13.5px; line-height: 1.55;
  max-width: 100%; word-break: break-word;
}
.from-admin .msg-bubble {
  background: var(--g1); color: var(--text);
  border-bottom-left-radius: 4px;
}
.from-user .msg-bubble {
  background: linear-gradient(135deg, var(--teal2), var(--teal));
  color: var(--ocean);
  border-bottom-right-radius: 4px;
  font-weight: 500;
}
.msg-time { font-size: 10.5px; color: var(--g3); margin-top: 4px; display:block; }
.from-user .msg-time { text-align: right; color: rgba(3,21,32,.5); }

/* Media message */
.msg-media {
  margin-top: 8px; border-radius: 12px; overflow: hidden;
  max-width: 280px; cursor: pointer;
  border: 2px solid rgba(0,212,170,.3);
  position: relative;
}
.msg-media img { width:100%; display:block; transition: transform .3s; }
.msg-media:hover img { transform: scale(1.02); }
.msg-media video { width:100%; max-height: 200px; display:block; }
.msg-media-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,.7), transparent);
  color: #fff; font-size: 11px; padding: 8px 10px 6px;
  display: flex; align-items: center; gap: 5px;
}
.media-badge {
  background: var(--teal); color: var(--ocean);
  font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 8px;
  margin-bottom: 6px; display: inline-flex; align-items: center; gap: 4px;
}

/* Typing */
.typing-dots { display: flex; gap: 4px; padding: 12px 16px; }
.typing-dots span {
  width: 8px; height: 8px; border-radius: 50%; background: var(--g2);
  animation: typingDot 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes typingDot { 0%,100%{transform:translateY(0);opacity:.4} 50%{transform:translateY(-5px);opacity:1} }

/* Input area */
.chat-input-area {
  padding: 14px 16px;
  border-top: 1px solid var(--g1);
  display: flex; align-items: flex-end; gap: 10px;
}
.chat-input {
  flex: 1;
  padding: 11px 14px;
  border: 1.5px solid var(--g2);
  border-radius: 12px;
  font-size: 14px;
  font-family: var(--B);
  resize: none;
  min-height: 44px;
  max-height: 120px;
  outline: none;
  transition: border-color .2s;
  line-height: 1.4;
}
.chat-input:focus { border-color: var(--teal); }
.chat-send-btn {
  width: 44px; height: 44px;
  background: var(--teal);
  border: none; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  color: var(--ocean);
  transition: all .2s var(--ease);
}
.chat-send-btn:hover { background: var(--teal2); transform: scale(1.05); }
.chat-send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
.chat-send-btn svg { width: 18px; height: 18px; }

/* Empty state */
.empty-threads {
  text-align: center; padding: 48px 20px;
  color: var(--g3);
}
.empty-threads .ico { font-size: 52px; margin-bottom: 12px; }
.empty-threads h3 { font-size: 17px; color: var(--g4); margin-bottom: 6px; }

/* Lightbox */
.lb { position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px; }
.lb.open { display:flex; }
.lb img,.lb video { max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain; }
.lb-close { position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center; }

@media(max-width:600px){
  .support-wrap { padding: 20px 16px 80px; }
  .push-bar { flex-direction:column; align-items:flex-start; gap:10px; }
  .chat-messages { max-height: 320px; }
  .msg { max-width: 92%; }
}
</style>
</head>
<body>
<div id="nav"></div>

<div class="support-wrap">
  <div class="support-header">
    <h1>💬 Support & Chat</h1>
    <p>File complaints, track your issues, and receive live media from us — all in one place.</p>
  </div>

  <!-- Push notification opt-in -->
  <div class="push-bar" id="push-bar" style="display:none">
    <span style="font-size:24px">🔔</span>
    <div class="push-bar-text">
      <strong>Enable Notifications</strong>
      <span>Get notified instantly when we reply or send you media</span>
    </div>
    <button class="push-btn" id="push-btn" onclick="enablePush()">Enable</button>
  </div>

  <!-- New thread -->
  <div class="new-thread-card">
    <h3>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--teal2)" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Start New Conversation
    </h3>
    <input type="text" class="subject-input" id="new-subject" placeholder="Subject (e.g. Complaint about order, Media request…)">
    <textarea class="msg-textarea" id="new-msg" placeholder="Describe your issue or request…"></textarea>
    <div id="new-thread-msg"></div>
    <button class="btn btn-teal" onclick="createThread()" id="new-thread-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Send Message
    </button>
  </div>

  <!-- Thread list -->
  <h3 style="font-family:var(--R);font-size:16px;font-weight:700;color:var(--ocean);margin-bottom:14px" id="threads-heading">Your Conversations</h3>
  <div class="thread-list" id="thread-list">
    <div style="text-align:center;padding:28px;color:var(--g3)">Loading conversations…</div>
  </div>

  <!-- Active chat window -->
  <div class="chat-window" id="chat-window">
    <div class="chat-header">
      <div class="chat-header-icon" id="chat-header-icon">💬</div>
      <div class="chat-header-info">
        <div class="chat-header-subject" id="chat-subject">Loading…</div>
        <div class="chat-header-status" id="chat-status">Open</div>
      </div>
      <button class="chat-close" onclick="closeChat()">✕</button>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area" id="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="Type your message…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"
        oninput="autoResize(this)"></textarea>
      <button class="chat-send-btn" id="chat-send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="if(event.target===this||event.target.classList.contains('lb-close'))closeLb()">
  <button class="lb-close">✕</button>
  <div id="lb-content"></div>
</div>

<script src="js/app.js"></script>
<script>
const COMPANY_EMAIL = 'Coreconics@fastservice.com';
let user, activeThreadId = null, realtimeSub = null;

function openLb(url, type) {
  const c = document.getElementById('lb-content');
  c.innerHTML = type==='video'
    ? `<video src="${url}" controls autoplay style="max-width:90vw;max-height:80vh;border-radius:12px"></video>`
    : `<img src="${url}" style="max-width:90vw;max-height:80vh;border-radius:12px" alt="">`;
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb() {
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow = '';
  const v = document.querySelector('#lb-content video');
  if (v) v.pause();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function fmtTime(d) {
  const dt = new Date(d);
  return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) + ' ' +
    dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

// ── Web Push ─────────────────────────────────────────
const VAPID_PUBLIC = 'YOUR_VAPID_PUBLIC_KEY'; // replace after generating

async function registerSW() {
  if (!('serviceWorker' in navigator)) return null;
  try {
    const reg = await navigator.serviceWorker.register('sw.js');
    return reg;
  } catch(e) { return null; }
}

async function enablePush() {
  const btn = document.getElementById('push-btn');
  btn.textContent = 'Enabling…'; btn.disabled = true;

  try {
    const reg = await registerSW();
    if (!reg) throw new Error('SW not supported');

    const permission = await Notification.requestPermission();
    if (permission !== 'granted') throw new Error('Permission denied');

    // If no real VAPID key yet, just mark as enabled for UI
    if (VAPID_PUBLIC === 'YOUR_VAPID_PUBLIC_KEY') {
      localStorage.setItem('aq_push', '1');
      btn.textContent = '✓ Enabled';
      btn.classList.add('enabled');
      showToast('🔔 Notifications enabled!');
      return;
    }

    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC)
    });

    const subJson = sub.toJSON();
    await sb.from('push_subscriptions').upsert([{
      user_id:  user.id,
      endpoint: subJson.endpoint,
      p256dh:   subJson.keys.p256dh,
      auth:     subJson.keys.auth,
    }]);

    localStorage.setItem('aq_push', '1');
    btn.textContent = '✓ Enabled'; btn.classList.add('enabled');
    showToast('🔔 Notifications enabled!');
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Enable';
    showToast('Could not enable: ' + e.message);
  }
}

function urlBase64ToUint8Array(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from(raw, c => c.charCodeAt(0));
}

// ── Threads ───────────────────────────────────────────
async function loadThreads() {
  const list = document.getElementById('thread-list');
  try {
    const { data: threads } = await sb.from('support_threads')
      .select('*, support_messages(id, message, media_url, sender, read_by_user, created_at)')
      .eq('user_id', user.id)
      .order('updated_at', { ascending: false });

    if (!threads?.length) {
      list.innerHTML = `<div class="empty-threads"><div class="ico">💬</div><h3>No conversations yet</h3><p>Start one above to get help or request media.</p></div>`;
      return;
    }

    list.innerHTML = threads.map(t => {
      const msgs = t.support_messages || [];
      const last = msgs[msgs.length - 1];
      const unread = msgs.filter(m => m.sender === 'admin' && !m.read_by_user).length;
      const isMedia = t.subject?.includes('Media Request') || t.subject?.includes('Photo');
      const preview = last?.media_url ? '📸 Media sent' : last?.message?.slice(0,60) || 'No messages yet';
      return `
      <div class="thread-card ${t.id===activeThreadId?'active':''} ${unread>0?'has-unread':''}"
        onclick="openThread('${t.id}','${t.subject?.replace(/'/g,"\\'")}','${t.status}',${isMedia})">
        <div class="thread-icon ${isMedia?'media':''}">${isMedia?'📸':'💬'}</div>
        <div class="thread-info">
          <div class="thread-subject">${t.subject}</div>
          <div class="thread-preview">${preview}</div>
        </div>
        <div class="thread-meta">
          <span class="thread-time">${last?fmtTime(last.created_at):fmtTime(t.created_at)}</span>
          ${unread>0?`<span class="thread-badge">${unread} new</span>`:''}
          <span class="status-chip status-${t.status}">${t.status.replace('_',' ')}</span>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = `<p style="color:var(--g3);padding:20px;text-align:center">Could not load conversations.</p>`;
  }
}

// ── Create Thread ─────────────────────────────────────
async function createThread() {
  const subject = document.getElementById('new-subject').value.trim();
  const msg     = document.getElementById('new-msg').value.trim();
  const btnEl   = document.getElementById('new-thread-btn');
  const msgEl   = document.getElementById('new-thread-msg');

  if (!subject) { msgEl.innerHTML='<div class="alert alert-error">Please enter a subject.</div>'; return; }
  if (!msg)     { msgEl.innerHTML='<div class="alert alert-error">Please write a message.</div>'; return; }

  btnEl.disabled = true; btnEl.textContent = 'Sending…';
  try {
    const { data: thread, error } = await sb.from('support_threads').insert([{
      user_id: user.id, subject, status: 'open'
    }]).select().single();
    if (error) throw error;

    await sb.from('support_messages').insert([{
      thread_id: thread.id, sender: 'user', message: msg
    }]);

    document.getElementById('new-subject').value = '';
    document.getElementById('new-msg').value = '';
    msgEl.innerHTML = '<div class="alert alert-success">✓ Message sent! We\'ll reply soon.</div>';
    setTimeout(() => { msgEl.innerHTML = ''; }, 4000);
    await loadThreads();
    openThread(thread.id, subject, 'open', false);
    showToast('💬 Conversation started!');
  } catch(e) {
    msgEl.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
  btnEl.disabled = false; btnEl.textContent = 'Send Message';
  btnEl.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send Message';
}

// ── Open Thread ───────────────────────────────────────
async function openThread(id, subject, status, isMedia) {
  activeThreadId = id;
  const win = document.getElementById('chat-window');
  win.classList.add('open');
  document.getElementById('chat-subject').textContent = subject;
  document.getElementById('chat-status').textContent = status.replace('_', ' ');
  document.getElementById('chat-header-icon').textContent = isMedia ? '📸' : '💬';
  document.getElementById('chat-messages').innerHTML = '<div style="text-align:center;color:var(--g3);padding:20px;font-size:13px">Loading…</div>';

  // Scroll to window
  setTimeout(() => win.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);

  // Disable input if resolved
  const inputArea = document.getElementById('chat-input-area');
  inputArea.style.display = (status === 'closed' || status === 'resolved') ? 'none' : 'flex';

  await loadMessages(id);
  await markRead(id);
  subscribeRealtime(id);
  await loadThreads(); // refresh unread counts
}

// ── Load Messages ─────────────────────────────────────
async function loadMessages(threadId) {
  const box = document.getElementById('chat-messages');
  const { data: msgs } = await sb.from('support_messages')
    .select('*').eq('thread_id', threadId)
    .order('created_at', { ascending: true });

  if (!msgs?.length) {
    box.innerHTML = '<div style="text-align:center;color:var(--g3);padding:20px;font-size:13px">No messages yet.</div>';
    return;
  }

  box.innerHTML = msgs.map(m => renderMsg(m)).join('');
  box.scrollTop = box.scrollHeight;
}

function renderMsg(m) {
  const isAdmin = m.sender === 'admin';
  let mediaHtml = '';

  if (m.media_url) {
    const isVideo = m.media_type === 'video' || m.media_url.match(/\.(mp4|webm|mov)/i);
    mediaHtml = `
      <div class="msg-media" onclick="openLb('${m.media_url}','${isVideo?'video':'image'}')">
        ${isAdmin ? `<span class="media-badge">📸 Live ${isVideo?'Video':'Photo'} from Aquanics</span>` : ''}
        ${isVideo
          ? `<video src="${m.media_url}" style="max-height:180px" preload="metadata"></video>`
          : `<img src="${m.media_url}" alt="Media" loading="lazy">`
        }
        <div class="msg-media-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
          Tap to ${isVideo?'play':'view full'} ${isVideo?'video':'image'}
        </div>
      </div>`;
  }

  return `
  <div class="msg from-${isAdmin?'admin':'user'}">
    <div class="msg-avatar">
      ${isAdmin ? '🐠' : (user?.name?.[0]||'U')}
    </div>
    <div>
      ${m.message ? `<div class="msg-bubble">${m.message.replace(/\n/g,'<br>')}</div>` : ''}
      ${mediaHtml}
      <span class="msg-time">${fmtTime(m.created_at)}${isAdmin?' · Aquanics':''}</span>
    </div>
  </div>`;
}

// ── Send Message ──────────────────────────────────────
async function sendMsg() {
  const input = document.getElementById('chat-input');
  const msg   = input.value.trim();
  if (!msg || !activeThreadId) return;

  const btn = document.getElementById('chat-send-btn');
  btn.disabled = true;
  input.value = '';
  input.style.height = '';

  try {
    await sb.from('support_messages').insert([{
      thread_id: activeThreadId,
      sender:    'user',
      message:   msg,
    }]);
    await sb.from('support_threads').update({ updated_at: new Date().toISOString() }).eq('id', activeThreadId);
    await loadMessages(activeThreadId);
  } catch(e) {
    showToast('Could not send: ' + e.message);
    input.value = msg;
  }
  btn.disabled = false;
}

// ── Mark read ─────────────────────────────────────────
async function markRead(threadId) {
  await sb.from('support_messages').update({ read_by_user: true })
    .eq('thread_id', threadId).eq('sender', 'admin').eq('read_by_user', false);
}

// ── Close chat ────────────────────────────────────────
function closeChat() {
  document.getElementById('chat-window').classList.remove('open');
  if (realtimeSub) { sb.removeChannel(realtimeSub); realtimeSub = null; }
  activeThreadId = null;
  loadThreads();
}

// ── Realtime subscription ──────────────────────────────
function subscribeRealtime(threadId) {
  if (realtimeSub) sb.removeChannel(realtimeSub);
  realtimeSub = sb.channel('thread-' + threadId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'support_messages',
      filter: 'thread_id=eq.' + threadId,
    }, async (payload) => {
      if (payload.new.sender === 'admin') {
        const box = document.getElementById('chat-messages');
        box.insertAdjacentHTML('beforeend', renderMsg(payload.new));
        box.scrollTop = box.scrollHeight;
        await markRead(threadId);
        showToast('📩 New reply from Aquanics!');
        // Browser notification if page hidden
        if (document.hidden && Notification.permission === 'granted') {
          new Notification('New reply from Aquanics', {
            body: payload.new.message || (payload.new.media_url ? '📸 Media sent' : ''),
            icon: 'logo.png',
            tag:  'chat-reply',
          });
        }
      }
    })
    .subscribe();
}

// ── Init ──────────────────────────────────────────────
async function init() {
  await renderNav();
  renderFooter();
  registerSW();

  user = Auth.getUser();
  if (!user) {
    Auth.requireAuth();
    return;
  }

  // Show push opt-in if not enabled and browser supports
  if ('Notification' in window && Notification.permission === 'default' && !localStorage.getItem('aq_push')) {
    document.getElementById('push-bar').style.display = 'flex';
  } else if (localStorage.getItem('aq_push')) {
    const bar = document.getElementById('push-bar');
    bar.style.display = 'flex';
    const btn = document.getElementById('push-btn');
    btn.textContent = '✓ Enabled'; btn.classList.add('enabled');
  }

  await loadThreads();

  // Auto-open thread from URL ?thread=ID
  const urlThread = new URLSearchParams(location.search).get('thread');
  if (urlThread) openThread(urlThread, 'Loading…', 'open', false);
}

init();
</script>
