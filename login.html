<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login – Aquanics</title>
  <link rel="icon" href="logo.png">
  
  <style>
    body{background:linear-gradient(160deg,#020e18 0%,#051c2c 35%,#0a2d44 65%,#0f3d5c 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{background:rgba(255,255,255,.04);backdrop-filter:blur(32px);border:1px solid rgba(0,212,170,.15);border-radius:28px;padding:44px;width:100%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,.4);}
    .logo-wrap{display:flex;justify-content:center;margin-bottom:32px;}
    .logo-wrap img{height:46px;filter:brightness(0)invert(1);}
    .tabs{display:flex;background:rgba(255,255,255,.06);border-radius:12px;padding:4px;margin-bottom:28px;gap:4px;}
    .tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;border:none;background:none;font-family:var(--fb);color:rgba(255,255,255,.5);border-radius:9px;transition:all .2s;}
    .tab.on{background:var(--teal);color:var(--ocean);}
    .panel{display:none;}.panel.on{display:block;}
    .step2{display:none;}.step2.on{display:block;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.45);margin-bottom:6px;}
    .field input{width:100%;padding:12px 16px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;color:#fff;font-size:14px;font-family:var(--fb);outline:none;transition:all .2s;}
    .field input:focus{border-color:var(--teal);background:rgba(255,255,255,.1);box-shadow:0 0 0 3px rgba(0,212,170,.12);}
    .field input::placeholder{color:rgba(255,255,255,.25);}
    .phone-row{display:flex;gap:8px;}
    .pfx{padding:12px 14px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;color:rgba(255,255,255,.6);font-size:14px;white-space:nowrap;}
    .otp-boxes{display:flex;gap:10px;justify-content:center;margin:16px 0;}
    .obox{width:50px;height:58px;text-align:center;font-size:24px;font-weight:700;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-family:var(--fd);outline:none;transition:all .2s;}
    .obox:focus{border-color:var(--teal);background:rgba(0,212,170,.08);box-shadow:0 0 0 3px rgba(0,212,170,.15);}
    .timer{text-align:center;font-size:13px;color:rgba(255,255,255,.4);margin-bottom:14px;}
    .timer .rs{color:var(--teal);cursor:pointer;font-weight:600;}
    .timer .rs:hover{text-decoration:underline;}
    .back-btn{background:none;border:none;color:var(--teal);font-size:13px;cursor:pointer;font-family:var(--fb);margin-bottom:12px;display:flex;align-items:center;gap:4px;}
    .back-btn:hover{text-decoration:underline;}
    .btn-full{width:100%;justify-content:center;}
    .terms{font-size:12px;color:rgba(255,255,255,.3);text-align:center;margin-top:16px;line-height:1.6;}
    .terms a{color:var(--teal);}
    #msg{margin-bottom:12px;}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="card">
  <div class="logo-wrap"><a href="index.html"><img src="logo.png" alt="Aquanics"></a></div>
  <div class="tabs">
    <button class="tab on" onclick="swTab('login')">Login</button>
    <button class="tab"    onclick="swTab('reg')">Register</button>
  </div>
  <div id="msg"></div>

  <!-- LOGIN -->
  <div class="panel on" id="p-login">
    <div id="ls1">
      <div class="field"><label>Mobile Number</label>
        <div class="phone-row">
          <span class="pfx">🇮🇳 +91</span>
          <input type="tel" id="l-ph" placeholder="10-digit number" maxlength="10" inputmode="numeric"
            onkeydown="if(event.key==='Enter')sendOTP('l')">
        </div>
      </div>
      <button id="l-send" class="btn btn-primary btn-lg btn-full" onclick="sendOTP('l')">Send OTP</button>
    </div>
    <div id="ls2" class="step2">
      <button class="back-btn" onclick="back('l')">← Change number</button>
      <p style="font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:4px">OTP sent to <strong id="l-show" style="color:#fff"></strong></p>
      <div class="otp-boxes" id="l-otp">
        <input class="obox" maxlength="1" inputmode="numeric" onkeyup="onk(this,'l-otp','l')">
        <input class="obox" maxlength="1" inputmode="numeric" onkeyup="onk(this,'l-otp','l')">
        <input class="obox" maxlength="1" inputmode="numeric" onkeyup="onk(this,'l-otp','l')">
        <input class="obox" maxlength="1" inputmode="numeric" onkeyup="onk(this,'l-otp','l')">
        <input class="obox" maxlength="1" inputmode="numeric" onkeyup="onk(this,'l-otp','l')">
        <input class="obox" maxlength="1" inputmode="numeric" onkeyup="onk(this,'l-otp','l')">
      </div>
      <div class="timer" id="l-timer"></div>
      <button id="l-verify" class="btn btn-primary btn-lg btn-full" onclick="verifyOTP('l')">Verify & Login</button>
    </div>
  </div>

  <!-- REGISTER -->
  <div class="panel" id="p-reg">
    <div id="rs1">
      <div class="field"><label>Full Name *</label><input type="text" id="r-name" placeholder="Your full name"></div>
      <div class="field"><label>Email (optional)</label><input type="email" id="r-email" placeholder="you@email.com"></div>
      <div class="field"><label>Mobile Number *</label>
        <div class="phone-row">
          <span class="pfx">🇮🇳 +91</span>
          <input type="tel" id="r-ph" placeholder="10-digit number" maxlength="10" inputmode="numeric">
        </div>
      </div>
      <button id="r-send" class="btn btn-primary btn-lg btn-full" onclick="sendOTP('r')">Send OTP</button>
    </div>
    <div id="rs2" class="step2">
      <button class="back-btn" onclick="back('r')">← Go back</button>
      <p style="font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:4px">OTP sent to <strong id="r-show" style="color:#fff"></strong></p>
      <div class="otp-boxes" id="r-otp">
        <input class="obox" maxlength="1" inputmode="numeric" onkeyup="onk(this,'r-otp','r')">
        <input class="obox" maxlength="1" inputmode="numeric" onkeyup="onk(this,'r-otp','r')">
        <input class="obox" maxlength="1" inputmode="numeric" onkeyup="onk(this,'r-otp','r')">
        <input class="obox" maxlength="1" inputmode="numeric" onkeyup="onk(this,'r-otp','r')">
        <input class="obox" maxlength="1" inputmode="numeric" onkeyup="onk(this,'r-otp','r')">
        <input class="obox" maxlength="1" inputmode="numeric" onkeyup="onk(this,'r-otp','r')">
      </div>
      <div class="timer" id="r-timer"></div>
      <button id="r-verify" class="btn btn-primary btn-lg btn-full" onclick="verifyOTP('r')">Verify & Create Account</button>
    </div>
  </div>
  <p class="terms">By continuing, you agree to our <a href="policies.html">Terms</a> & <a href="policies.html#privacy">Privacy Policy</a></p>
</div>

<script src="js/app.js"></script>
<script>
if(Auth.isLoggedIn()){ location.href=new URLSearchParams(location.search).get('redirect')||'/index.html'; }

let sessions={l:null,r:null}, phones={l:'',r:''}, rname='', remail='', timers={};

function swTab(t){
  document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('on',(i===0)===(t==='login')));
  document.getElementById('p-login').classList.toggle('on',t==='login');
  document.getElementById('p-reg').classList.toggle('on',t==='reg');
  msg('');
}

function msg(m,type='error'){
  document.getElementById('msg').innerHTML=m?`<div class="alert alert-${type}">${m}</div>`:'';
}

function onk(inp,cid,mode){
  const bs=[...document.getElementById(cid).querySelectorAll('.obox')];
  const i=bs.indexOf(inp);
  if(inp.value&&i<bs.length-1)bs[i+1].focus();
  if(event.key==='Backspace'&&!inp.value&&i>0)bs[i-1].focus();
  const otp=bs.map(b=>b.value).join('');
  if(otp.length===6)verifyOTP(mode);
}
function getotp(cid){return[...document.getElementById(cid).querySelectorAll('.obox')].map(b=>b.value).join('');}

function startTimer(p,fn){
  clearInterval(timers[p]);
  let s=30; const el=document.getElementById(p+'-timer');
  const tick=()=>{ el.innerHTML=`Resend in <strong>${s}s</strong>`; if(--s<0){clearInterval(timers[p]);el.innerHTML=`<span class="rs" onclick="${fn}">Resend OTP</span>`;} };
  tick(); timers[p]=setInterval(tick,1000);
}

function showStep2(p,phone){
  document.getElementById(p+'s1').style.display='none';
  document.getElementById(p+'s2').classList.add('on');
  document.getElementById(p+'-show').textContent='+91 '+phone;
  document.getElementById(p+'-otp').querySelectorAll('.obox').forEach(b=>b.value='');
  document.getElementById(p+'-otp').querySelector('.obox').focus();
  startTimer(p,p==='l'?"sendOTP('l')":"sendOTP('r')");
}
function back(p){document.getElementById(p+'s1').style.display='';document.getElementById(p+'s2').classList.remove('on');msg('');}

async function sendOTP(p){
  msg('');
  if(p==='l'){
    phones.l=document.getElementById('l-ph').value.trim();
    if(!/^[6-9]\d{9}$/.test(phones.l)){msg('Enter a valid 10-digit mobile number');return;}
    const btn=document.getElementById('l-send'); btn.disabled=true; btn.textContent='Sending…';
    try{ sessions.l=await OTP.send(phones.l); showStep2('l',phones.l); }
    catch(e){ msg('Could not send OTP: '+e.message); }
    btn.disabled=false; btn.textContent='Send OTP';
  } else {
    rname=document.getElementById('r-name').value.trim();
    remail=document.getElementById('r-email').value.trim();
    phones.r=document.getElementById('r-ph').value.trim();
    if(!rname){msg('Please enter your name');return;}
    if(!/^[6-9]\d{9}$/.test(phones.r)){msg('Enter a valid mobile number');return;}
    const {data:ex}=await sb.from('users').select('id').eq('phone',phones.r).maybeSingle();
    if(ex){msg('Account exists. Please login.');swTab('login');return;}
    const btn=document.getElementById('r-send'); btn.disabled=true; btn.textContent='Sending…';
    try{ sessions.r=await OTP.send(phones.r); showStep2('r',phones.r); }
    catch(e){ msg('Could not send OTP: '+e.message); }
    btn.disabled=false; btn.textContent='Send OTP';
  }
}

async function verifyOTP(p){
  msg('');
  if(p==='l'){
    const otp=getotp('l-otp');
    if(otp.length<6){msg('Enter all 6 digits');return;}
    const btn=document.getElementById('l-verify'); btn.disabled=true; btn.textContent='Verifying…';
    try{
      await OTP.verify(sessions.l,otp);
      const {data:user}=await sb.from('users').select('*').eq('phone',phones.l).maybeSingle();
      if(!user){msg('No account found. Please register.');swTab('reg');btn.disabled=false;btn.textContent='Verify & Login';return;}
      const token=crypto.randomUUID(), exp=new Date(Date.now()+30*24*60*60*1000).toISOString();
      await sb.from('sessions').insert([{token,user_id:user.id,expires_at:exp}]);
      Auth.setSession(user,token);
      msg('Login successful! Redirecting…','success');
      setTimeout(()=>location.href=new URLSearchParams(location.search).get('redirect')||'/index.html',700);
    }catch(e){ msg('Failed: '+e.message); btn.disabled=false; btn.textContent='Verify & Login'; }
  } else {
    const otp=getotp('r-otp');
    if(otp.length<6){msg('Enter all 6 digits');return;}
    const btn=document.getElementById('r-verify'); btn.disabled=true; btn.textContent='Creating account…';
    try{
      await OTP.verify(sessions.r,otp);
      const {data:user,error}=await sb.from('users').insert([{phone:phones.r,name:rname,email:remail||null,created_at:new Date().toISOString()}]).select().single();
      if(error)throw error;
      const token=crypto.randomUUID(), exp=new Date(Date.now()+30*24*60*60*1000).toISOString();
      await sb.from('sessions').insert([{token,user_id:user.id,expires_at:exp}]);
      Auth.setSession(user,token);
      msg('Account created! Redirecting…','success');
      setTimeout(()=>location.href=new URLSearchParams(location.search).get('redirect')||'/index.html',700);
    }catch(e){ msg('Failed: '+e.message); btn.disabled=false; btn.textContent='Verify & Create Account'; }
  }
}
</script>
</body>
</html>
