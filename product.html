<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product – Aquanics</title>
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.prod-layout{display:grid;grid-template-columns:1fr 1fr;gap:52px;padding:28px 0 60px;align-items:start;}
.gallery{position:sticky;top:90px;}
.gallery-main{aspect-ratio:1;background:var(--g1);border-radius:24px;overflow:hidden;margin-bottom:12px;cursor:zoom-in;position:relative;}
.gallery-main img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease);}
.gallery-main:hover img{transform:scale(1.05);}
.gallery-zoom{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border:none;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background .2s;}
.gallery-zoom:hover{background:#fff;}
.thumbs{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;}
.thumbs::-webkit-scrollbar{display:none;}
.thumb{width:72px;height:72px;border-radius:12px;overflow:hidden;cursor:pointer;border:2.5px solid transparent;flex-shrink:0;background:var(--g1);transition:border-color .2s;}
.thumb.active{border-color:var(--teal);}
.thumb img{width:100%;height:100%;object-fit:cover;}
.prod-cat-tag{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--teal2);margin-bottom:10px;display:block;}
.prod-title{font-family:var(--R);font-size:30px;font-weight:800;line-height:1.15;color:var(--ocean);margin-bottom:14px;}
.prod-rating{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.stars-big{font-size:18px;color:var(--gold);}
.stock-pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;}
.in-stock{background:#e6faf5;color:#007a60;}
.out-stock{background:#fdf0f0;color:#c0392b;}
.price-row{display:flex;align-items:baseline;gap:14px;margin-bottom:22px;flex-wrap:wrap;}
.big-price{font-family:var(--R);font-size:38px;font-weight:800;color:var(--ocean);}
.mrp-price{font-size:20px;color:var(--g3);text-decoration:line-through;}
.disc-pill{background:linear-gradient(135deg,var(--gold),#e08830);color:#fff;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;}
.highlights{background:linear-gradient(135deg,#f0fbf8,#e6faf5);border-radius:14px;padding:18px;margin-bottom:22px;}
.highlights h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g4);margin-bottom:12px;}
.highlights ul{list-style:none;}
.highlights li{font-size:13.5px;padding:5px 0;display:flex;gap:8px;align-items:flex-start;color:var(--text);}
.highlights li::before{content:'✓';color:var(--teal2);font-weight:700;flex-shrink:0;}
.qty-row{display:flex;align-items:center;gap:16px;margin-bottom:22px;}
.qty-label{font-size:14px;font-weight:600;}
.qty-ctrl{display:flex;align-items:center;border:2px solid var(--g1);border-radius:12px;overflow:hidden;}
.qty-btn{width:40px;height:40px;border:none;background:var(--g1);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.qty-btn:hover{background:var(--g2);}
.qty-val{width:52px;height:40px;text-align:center;border:none;border-left:2px solid var(--g1);border-right:2px solid var(--g1);font-size:16px;font-family:var(--B);font-weight:600;outline:none;}
.prod-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.prod-actions .btn{flex:1;min-width:130px;justify-content:center;}
.btn-wish-inline{background:#fff;border:2px solid var(--g1);color:var(--text);padding:12px 16px;border-radius:12px;font-family:var(--B);font-size:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
.btn-wish-inline:hover,.btn-wish-inline.on{border-color:#ee0055;color:#ee0055;}
.delivery-strip{background:var(--off);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;font-size:13px;margin-bottom:22px;border:1px solid var(--g1);}
.delivery-strip span{display:flex;align-items:center;gap:8px;}

/* MEDIA REQUEST BOX */
.mrb{background:linear-gradient(135deg,#062035 0%,#0a2d4a 100%);border-radius:18px;padding:22px;margin-bottom:22px;position:relative;overflow:hidden;border:1px solid rgba(0,212,170,.2);}
.mrb::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 80% 20%,rgba(0,212,170,.12),transparent);pointer-events:none;}
.mrb-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;position:relative;}
.mrb-icon{font-size:32px;animation:camb 3s ease-in-out infinite;flex-shrink:0;}
@keyframes camb{0%,100%{transform:rotate(-5deg) scale(1);}50%{transform:rotate(5deg) scale(1.08);}}
.mrb-title{font-family:var(--R);font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;}
.mrb-sub{font-size:12.5px;color:rgba(255,255,255,.5);line-height:1.5;}
.mrb-note{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(0,212,170,.2);border-radius:10px;color:#fff;font-size:13px;font-family:var(--B);padding:10px 14px;resize:none;outline:none;transition:border-color .2s;margin-bottom:12px;display:block;}
.mrb-note::placeholder{color:rgba(255,255,255,.3);}
.mrb-note:focus{border-color:var(--teal);}
.mrb-btn{background:linear-gradient(135deg,var(--teal),var(--teal2));color:var(--ocean);border:none;padding:11px 22px;border-radius:10px;font-size:13.5px;font-weight:700;font-family:var(--B);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .25s var(--ease);position:relative;}
.mrb-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,212,170,.3);}
.mrb-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none;}
.mrb-ok{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.25);border-radius:10px;font-size:13px;color:var(--teal);margin-top:4px;line-height:1.5;}
.mrb-ok a{color:var(--teal);font-weight:700;text-decoration:underline;}
.mrb-err{font-size:12.5px;color:#f87171;margin-top:8px;display:flex;align-items:center;gap:6px;}

/* TABS */
.tab-nav{display:flex;border-bottom:2px solid var(--g1);overflow-x:auto;scrollbar-width:none;}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-btn{padding:11px 18px;font-size:14px;font-weight:600;color:var(--g3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;font-family:var(--B);transition:all .2s;}
.tab-btn.on{color:var(--teal2);border-bottom-color:var(--teal2);}
.tab-pane{display:none;padding:20px 0;}
.tab-pane.on{display:block;}
.spec-table{width:100%;border-collapse:collapse;}
.spec-table tr:nth-child(even) td{background:var(--off);}
.spec-table td{padding:10px 14px;font-size:13.5px;border-radius:4px;}
.spec-table td:first-child{font-weight:600;color:var(--g4);width:40%;}
.rev-summary{display:flex;gap:32px;margin-bottom:24px;flex-wrap:wrap;}
.rev-big{text-align:center;min-width:90px;}
.rnum{font-family:var(--R);font-size:52px;font-weight:800;color:var(--ocean);line-height:1;}
.rstars{font-size:18px;color:var(--gold);}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:12px;}
.bar-track{flex:1;height:8px;background:var(--g1);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;background:var(--gold);border-radius:4px;}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;}
.lb.open{display:flex;}
.lb img,.lb video{max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain;}
.lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.lb-close:hover{background:rgba(255,255,255,.25);}

@media(max-width:900px){
  .prod-layout{grid-template-columns:1fr;gap:24px;padding:16px 0 48px;}
  .gallery{position:static;}
  .prod-title{font-size:22px;}
  .big-price{font-size:28px;}
}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>

<script>
// ── Anti-Inspect Protection ────────────────────────────────
(function(){
  // Disable right-click
  document.addEventListener('contextmenu', e => e.preventDefault());
  // Disable common keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (
      e.key === 'F12' ||
      (e.ctrlKey && e.shiftKey && ['I','J','C','K'].includes(e.key.toUpperCase())) ||
      (e.ctrlKey && e.key.toUpperCase() === 'U') ||
      (e.metaKey && e.altKey && ['I','J','C'].includes(e.key.toUpperCase()))
    ) { e.preventDefault(); return false; }
  });
  // Detect DevTools open via size heuristic
  let devOpen = false;
  const threshold = 160;
  function checkDev() {
    const wDiff = window.outerWidth - window.innerWidth;
    const hDiff = window.outerHeight - window.innerHeight;
    if (wDiff > threshold || hDiff > threshold) {
      if (!devOpen) {
        devOpen = true;
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;flex-direction:column;gap:16px"><div style="font-size:48px">🔒</div><h2>Access Restricted</h2><p>Developer tools are not allowed.</p><button onclick="location.reload()" style="padding:10px 24px;background:#00a882;color:#fff;border:none;border-radius:8px;cursor:pointer">Reload</button></div>';
      }
    } else {
      devOpen = false;
    }
  }
  setInterval(checkDev, 1000);
  // Disable text selection on sensitive areas
  document.addEventListener('selectstart', e => {
    if (e.target.closest('.prod-price,.prod-name,.big-price')) e.preventDefault();
  });
})();
</script>
</head>
<body>
<div id="nav"></div>

<div class="container">
  <div class="breadcrumb" id="bc">
    <a href="index.html">Home</a><span class="breadcrumb-sep">›</span>
    <a href="products.html" id="bc-cat">Products</a><span class="breadcrumb-sep">›</span>
    <span id="bc-name">Loading…</span>
  </div>
  <div id="prod-wrap">
    <div class="prod-layout">
      <div class="skel" style="aspect-ratio:1;border-radius:24px"></div>
      <div style="display:flex;flex-direction:column;gap:14px;padding-top:8px">
        <div class="skel" style="height:14px;width:30%;border-radius:6px"></div>
        <div class="skel" style="height:36px;width:90%;border-radius:8px"></div>
        <div class="skel" style="height:36px;width:70%;border-radius:8px"></div>
        <div class="skel" style="height:20px;width:40%;border-radius:6px;margin-top:8px"></div>
        <div class="skel" style="height:48px;width:50%;border-radius:8px"></div>
        <div class="skel" style="height:100px;border-radius:12px;margin-top:8px"></div>

        <div class="skel" style="height:120px;border-radius:18px"></div>
      </div>
    </div>
  </div>
  <div id="related-wrap" style="display:none;padding-bottom:60px">
    <div class="sec-head" style="margin-bottom:24px"><h2>Related <em>Products</em></h2></div>
    <div class="prod-grid" id="related-grid"></div>
  </div>
</div>

<div class="lb" id="lb" onclick="closeLb(event)">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <div id="lb-content"></div>
</div>


<div id="footer-wrap"></div>

<script src="js/app.js"></script>
<script>
const prodId = new URLSearchParams(location.search).get('id');
let currentProd = null, qty = 1;

function openLb(url, type) {
  const c = document.getElementById('lb-content');
  c.innerHTML = type === 'video'
    ? `<video src="${url}" controls autoplay style="max-width:90vw;max-height:80vh;border-radius:12px"></video>`
    : `<img src="${url}" style="max-width:90vw;max-height:80vh;border-radius:12px" alt="">`;
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb(e) {
  if (e && e.target !== document.getElementById('lb') && !e.target.classList.contains('lb-close')) return;
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow = '';
  const v = document.querySelector('#lb-content video');
  if (v) v.pause();
}

function switchThumb(url, i) {
  document.getElementById('main-img').src = url;
  document.querySelectorAll('.thumb').forEach((t,j) => t.classList.toggle('active', i===j));
}
function changeQty(d) { qty = Math.max(1, qty+d); document.getElementById('qty-val').value = qty; }
function switchTab(n) {
  document.querySelectorAll('.tab-btn,.tab-pane').forEach(e => e.classList.remove('on'));
  document.querySelector(`[data-tab="${n}"]`).classList.add('on');
  document.getElementById('tab-'+n).classList.add('on');
}
function addToCart() {
  if (currentProd) Cart.add({ id:currentProd.id, name:currentProd.name, price:currentProd.price, image_url:currentProd.image_url }, qty);
}
function buyNow() { addToCart(); location.href = 'cart.html'; }
function toggleWish() {
  if (!currentProd) return;
  const now = WL.toggle(currentProd.id);
  const btn = document.getElementById('wish-btn');
  btn.classList.toggle('on', now);
  btn.innerHTML = `<svg viewBox="0 0 24 24" width="17" height="17" fill="${now?'#ee0055':'none'}" stroke="${now?'#ee0055':'currentColor'}" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ${now?'Wishlisted':'Wishlist'}`;
}

// ── Media Request ────────────────────────────────────
async function checkReq(pid) {
  const user = Auth.getUser();
  if (!user) return null;
  const { data } = await sb.from('media_requests').select('id,status')
    .eq('product_id', pid).eq('user_id', user.id)
    .order('created_at',{ascending:false}).limit(1);
  return data?.[0]||null;
}

async function sendMediaReq() {
  const user = Auth.getUser();
  if (!user) { showToast('Please login first'); location.href='login.html?redirect='+encodeURIComponent(location.href); return; }
  const btn  = document.getElementById('mrb-btn');
  const note = document.getElementById('mrb-note')?.value?.trim() || '';
  const errEl= document.getElementById('mrb-err');
  btn.disabled = true;
  btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-18 0"/></svg> Sending…';
  try {
    const { error:e1 } = await sb.from('media_requests').insert([{
      product_id:currentProd.id, product_name:currentProd.name,
      category:currentProd.category_slug, user_id:user.id,
      note:note||null
    }]);
    if (e1) throw e1;
    // Create support thread
    const { data:th } = await sb.from('support_threads').insert([{
      user_id:user.id, subject:`Live Media Request: ${currentProd.name}`, status:'open'
    }]).select().single();
    if (th) {
      await sb.from('support_messages').insert([{
        thread_id:th.id, sender:'user',
        message:`I'd like to see a current live photo/video of: ${currentProd.name}${note?'\n\nNote: '+note:''}`
      }]);
    }
    document.getElementById('mrb-form').innerHTML = `
      <div class="mrb-ok">
        <span>✅</span>
        <span>Request sent! We'll share a live photo/video in your <a href="support.html">chat inbox</a> soon. You'll also receive an email notification.</span>
      </div>`;
    showToast('📸 Request sent!');
  } catch(e) {
    if (errEl) errEl.textContent = '⚠️ ' + e.message;
    btn.disabled = false;
    btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg> Request Live Photo / Video';
  }
}

// ── Render ───────────────────────────────────────────
async function render(p) {
  currentProd = p;
  const disc  = p.mrp&&p.mrp>p.price ? Math.round((1-p.price/p.mrp)*100) : 0;
  const imgs  = [p.image_url,...(p.images||[])].filter(Boolean);
  const w     = WL.has(p.id);
  const specs = p.specifications||{};
  const animalType = p.category_slug?.includes('fish')?'fish':p.category_slug?.includes('bird')?'bird':p.category_slug?.includes('dog')?'dog':p.category_slug?.includes('cat')?'cat':'animal';

  document.title = p.name+' – Aquanics';
  document.getElementById('bc-cat').textContent = p.categories?.name||'Products';
  document.getElementById('bc-cat').href = 'products.html?cat='+(p.category_slug||'');
  document.getElementById('bc-name').textContent = p.name;

  const req = await checkReq(p.id);
  let mrbInner = '';
  if (req?.status === 'fulfilled') {
    mrbInner = `<div class="mrb-ok"><span>✅</span><span>Your request was fulfilled! Check your <a href="support.html">chat inbox</a> for the photo/video.</span></div>`;
  } else if (req?.status === 'pending') {
    mrbInner = `<div class="mrb-ok"><span>⏳</span><span>Request pending — we'll share a live photo/video in your <a href="support.html">chat inbox</a> shortly.</span></div>`;
  } else {
    mrbInner = `
      <textarea id="mrb-note" class="mrb-note" rows="2" placeholder="Optional: any specific detail? (e.g. show the fins clearly, close-up of the color…)"></textarea>
      <button id="mrb-btn" class="mrb-btn" onclick="sendMediaReq()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        Request Live Photo / Video
      </button>
      <div id="mrb-err" class="mrb-err"></div>`;
  }

  document.getElementById('prod-wrap').innerHTML = `
  <div class="prod-layout">
    <div class="gallery">
      <div class="gallery-main">
        <img id="main-img"
          src="${imgs[0]||''}"
          onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'400\\' height=\\'400\\'><rect width=\\'400\\' height=\\'400\\' fill=\\'%23edf4f2\\'/><text x=\\'50%25\\' y=\\'50%25\\' font-size=\\'80\\' text-anchor=\\'middle\\' dominant-baseline=\\'middle\\'>🐠</text></svg>'"
          alt="${p.name}"
          onclick="openLb(this.src,'image')">
        <button class="gallery-zoom" onclick="openLb(document.getElementById('main-img').src,'image')">⛶</button>
      </div>
      ${imgs.length>1?`<div class="thumbs">${imgs.map((img,i)=>`<div class="thumb${i===0?' active':''}" onclick="switchThumb('${img.replace(/'/g,"\\'")}',${i})"><img src="${img}" alt=""></div>`).join('')}</div>`:''}
    </div>

    <div class="prod-info">
      <span class="prod-cat-tag">${p.categories?.name||''}</span>
      <h1 class="prod-title">${p.name}</h1>
      <div class="prod-rating">
        <span class="stars-big">${fmt.stars(p.rating||4.5)}</span>
        <span style="font-weight:700;font-size:16px">${(p.rating||4.5).toFixed(1)}</span>
        <span style="color:var(--g3);font-size:13px">(${p.review_count||0} reviews)</span>
        <span class="stock-pill ${p.in_stock===false?'out-stock':'in-stock'}">${p.in_stock===false?'✕ Out of Stock':'✓ In Stock'}</span>
      </div>
      <div class="price-row">
        <span class="big-price">${fmt.price(p.price)}</span>
        ${p.mrp&&p.mrp>p.price?`<span class="mrp-price">${fmt.price(p.mrp)}</span>`:''}
        ${disc?`<span class="disc-pill">${disc}% OFF</span>`:''}
      </div>
      ${p.highlights?.length?`<div class="highlights"><h4>Key Highlights</h4><ul>${p.highlights.map(h=>`<li>${h}</li>`).join('')}</ul></div>`:''}
      <div class="qty-row">
        <span class="qty-label">Quantity:</span>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <input class="qty-val" id="qty-val" type="number" value="1" min="1" max="99" onchange="qty=Math.max(1,parseInt(this.value)||1);this.value=qty">
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
      </div>
      <div class="prod-actions">
        <button class="btn btn-teal btn-lg" onclick="addToCart()" ${p.in_stock===false?'disabled':''}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Add to Cart
        </button>
        <button class="btn btn-ocean btn-lg" onclick="buyNow()" ${p.in_stock===false?'disabled':''}>Buy Now</button>
        <button class="btn-wish-inline ${w?'on':''}" id="wish-btn" onclick="toggleWish()">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="${w?'#ee0055':'none'}" stroke="${w?'#ee0055':'currentColor'}" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          ${w?'Wishlisted':'Wishlist'}
        </button>
      </div>
      <div class="delivery-strip">
        <span>🚚 Free delivery on orders above ₹599</span>
        <span>🐠 DOA Policy — Dead on Arrival replacement guaranteed</span>
        <span>↩️ Easy returns within 7 days</span>
      </div>

      <!-- 📸 LIVE MEDIA REQUEST -->
      <div class="mrb">
        <div class="mrb-head">
          <div class="mrb-icon">📸</div>
          <div>
            <div class="mrb-title">Request a Live Photo / Video</div>
            <div class="mrb-sub">Want to see this ${animalType} right now, live? We'll capture and send you a fresh photo or video before you decide to buy.</div>
          </div>
        </div>
        <div id="mrb-form">${mrbInner}</div>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <div class="tab-nav">
          <button class="tab-btn on" data-tab="desc" onclick="switchTab('desc')">Description</button>
          <button class="tab-btn" data-tab="specs" onclick="switchTab('specs')">Specifications</button>
          <button class="tab-btn" data-tab="rev" onclick="switchTab('rev')">Reviews (${p.review_count||0})</button>
        </div>
        <div class="tab-pane on" id="tab-desc">
          <p style="font-size:14px;line-height:1.85;color:var(--g4)">${p.description||'No description provided.'}</p>
        </div>
        <div class="tab-pane" id="tab-specs">
          ${Object.keys(specs).length?`<table class="spec-table">${Object.entries(specs).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</table>`:'<p style="color:var(--g3);font-size:13px;padding:8px 0">No specifications listed.</p>'}
        </div>
        <div class="tab-pane" id="tab-rev">
          <div class="rev-summary">
            <div class="rev-big">
              <div class="rnum">${(p.rating||4.5).toFixed(1)}</div>
              <div class="rstars">${fmt.stars(p.rating||4.5)}</div>
              <small style="font-size:11px;color:var(--g3);display:block;margin-top:4px">${p.review_count||0} reviews</small>
            </div>
            <div style="flex:1">${[5,4,3,2,1].map(n=>{
              const r=p.rating||4.5,pct=n===Math.round(r)?62:n===Math.floor(r)?25:Math.max(0,(n-1)*5);
              return `<div class="bar-row"><span style="min-width:24px;text-align:right;color:var(--g3)">${n}★</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><span style="color:var(--g3);min-width:28px">${pct}%</span></div>`;
            }).join('')}</div>
          </div>
          <p style="color:var(--g3);font-size:13px;text-align:center;padding:20px 0">Reviews will appear here once customers start reviewing.</p>
        </div>
      </div>
    </div>
  </div>`;
}

async function loadRelated(p) {
  const data = await DB.related(p.category_slug, p.id).catch(()=>[]);
  if (!data.length) return;
  document.getElementById('related-wrap').style.display = 'block';
  document.getElementById('related-grid').innerHTML = data.map(x => prodCard(x)).join('');
}

async function init() {
  await renderNav();
  renderFooter();
  if (!prodId) { document.getElementById('prod-wrap').innerHTML='<div style="padding:60px;text-align:center"><h3>Product not found</h3><a href="products.html" class="btn btn-teal" style="margin-top:16px;display:inline-flex">Browse Products</a></div>'; return; }
  try {
    const p = await DB.product(prodId);
    if (!p) throw new Error();
    await render(p);
    loadRelated(p);
  } catch(e) {
    document.getElementById('prod-wrap').innerHTML = '<div style="padding:60px;text-align:center"><h3>Product not found</h3><a href="products.html" class="btn btn-teal" style="margin-top:16px;display:inline-flex">Browse Products</a></div>';
  }
}
init();
</script>
<script src="js/chat-widget.js"></script>
<script src="js/cart-ai.js"></script>
</body>
</html>
