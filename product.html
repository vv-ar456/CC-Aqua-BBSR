<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Product – Aquanics</title>
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .prod-layout{display:grid;grid-template-columns:1fr 1fr;gap:52px;padding:32px 0 60px;align-items:start;}
    /* Gallery */
    .gallery{position:sticky;top:90px;}
    .gallery-main{aspect-ratio:1;background:var(--gray1);border-radius:var(--r3);overflow:hidden;margin-bottom:12px;cursor:zoom-in;position:relative;}
    .gallery-main img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease);}
    .gallery-main:hover img{transform:scale(1.06);}
    .gallery-zoom{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.8);backdrop-filter:blur(8px);border:none;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
    .thumbs{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;}
    .thumbs::-webkit-scrollbar{display:none;}
    .thumb{width:72px;height:72px;border-radius:12px;overflow:hidden;cursor:pointer;border:2.5px solid transparent;flex-shrink:0;background:var(--gray1);transition:border-color .2s;}
    .thumb.active{border-color:var(--teal);}
    .thumb img{width:100%;height:100%;object-fit:cover;}
    /* Info */
    .prod-info{}
    .prod-cat-tag{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--teal2);margin-bottom:10px;display:block;}
    .prod-title{font-family:var(--fd);font-size:32px;font-weight:700;line-height:1.15;color:var(--ocean);margin-bottom:14px;}
    .prod-rating{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
    .stars-big{font-size:18px;color:var(--gold);}
    .rating-score{font-weight:700;font-size:16px;}
    .rating-cnt{color:var(--gray3);font-size:13px;}
    .stock-pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;}
    .in-stock{background:#e6faf5;color:#007a60;}
    .out-stock{background:#fdf0f0;color:#c0392b;}
    .price-row{display:flex;align-items:baseline;gap:14px;margin-bottom:22px;flex-wrap:wrap;}
    .prod-price{font-family:var(--fd);font-size:40px;font-weight:700;color:var(--ocean);}
    .prod-mrp{font-size:20px;color:var(--gray3);text-decoration:line-through;}
    .prod-disc{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;}
    .highlights{background:linear-gradient(135deg,#f0fbf8,#e6faf5);border-radius:var(--r);padding:18px;margin-bottom:22px;}
    .highlights h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray4);margin-bottom:12px;}
    .highlights li{font-size:13.5px;padding:5px 0;list-style:none;display:flex;gap:8px;align-items:flex-start;color:var(--text);}
    .highlights li::before{content:'✓';color:var(--teal2);font-weight:700;flex-shrink:0;}
    .qty-row{display:flex;align-items:center;gap:16px;margin-bottom:22px;}
    .qty-label{font-size:14px;font-weight:600;}
    .qty-ctrl{display:flex;align-items:center;border:2px solid var(--gray1);border-radius:12px;overflow:hidden;}
    .qty-btn{width:40px;height:40px;border:none;background:var(--gray1);font-size:20px;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;}
    .qty-btn:hover{background:var(--gray2);}
    .qty-val{width:52px;height:40px;text-align:center;border:none;border-left:2px solid var(--gray1);border-right:2px solid var(--gray1);font-size:16px;font-family:var(--fb);font-weight:600;outline:none;}
    .prod-actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;}
    .prod-actions .btn{flex:1;min-width:140px;justify-content:center;}
    .btn-wish{background:#fff;border:2px solid var(--gray1);color:var(--text);padding:12px 16px;border-radius:12px;font-family:var(--fb);font-size:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
    .btn-wish:hover,.btn-wish.wished{border-color:#ee0055;color:#ee0055;}
    .delivery-strip{background:var(--off);border-radius:var(--r);padding:14px 16px;display:flex;flex-direction:column;gap:8px;font-size:13px;margin-bottom:22px;}
    .delivery-strip span{display:flex;align-items:center;gap:8px;}
    /* Tabs */
    .tabs{}
    .tab-nav{display:flex;border-bottom:2px solid var(--gray1);overflow-x:auto;scrollbar-width:none;}
    .tab-nav::-webkit-scrollbar{display:none;}
    .tab-btn{padding:12px 20px;font-size:14px;font-weight:600;color:var(--gray3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;font-family:var(--fb);transition:all .2s;}
    .tab-btn.on{color:var(--teal2);border-bottom-color:var(--teal2);}
    .tab-pane{display:none;padding:20px 0;}
    .tab-pane.on{display:block;}
    .spec-table{width:100%;border-collapse:collapse;}
    .spec-table tr:nth-child(even) td{background:var(--off);}
    .spec-table td{padding:10px 14px;font-size:13.5px;border-radius:4px;}
    .spec-table td:first-child{font-weight:600;color:var(--gray4);width:40%;}
    /* Reviews */
    .rev-summary{display:flex;gap:32px;margin-bottom:24px;flex-wrap:wrap;}
    .rev-big{text-align:center;min-width:90px;}
    .rev-big .num{font-family:var(--fd);font-size:52px;font-weight:800;color:var(--ocean);line-height:1;}
    .rev-big .stars{font-size:18px;color:var(--gold);}
    .rev-big small{font-size:11px;color:var(--gray3);display:block;margin-top:4px;}
    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:12px;}
    .bar-track{flex:1;height:8px;background:var(--gray1);border-radius:4px;overflow:hidden;}
    .bar-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .6s var(--ease);}
    @media(max-width:900px){.prod-layout{grid-template-columns:1fr;}.gallery{position:static;}.prod-title{font-size:24px;}.prod-price{font-size:32px;}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
<div id="navbar"></div>

<div class="container">
  <div class="breadcrumb" id="bc">
    <a href="/index.html">Home</a>
    <span class="breadcrumb-sep">›</span>
    <a href="/products.html" id="bc-cat">Products</a>
    <span class="breadcrumb-sep">›</span>
    <span id="bc-name">Loading…</span>
  </div>

  <div id="prod-layout">
    <div class="prod-layout">
      <div class="skeleton" style="aspect-ratio:1;border-radius:28px"></div>
      <div style="display:flex;flex-direction:column;gap:14px">
        ${[80,60,40,40,100,80,60].map(w=>`<div class="skeleton" style="height:22px;width:${w}%;border-radius:8px"></div>`).join('')}
      </div>
    </div>
  </div>

  <div id="related-wrap" style="display:none;padding-bottom:60px">
    <div class="section-head"><h2>Related <span>Products</span></h2></div>
    <div class="products-grid" id="related-grid"></div>
  </div>
</div>

<a href="https://wa.me/919999999999" target="_blank" class="wa-float">
  <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
</a>
<div id="footer"></div>

<script src="/js/config.js"></script>
<script src="/js/ui.js"></script>
<script>
let prod=null, qty=1;
const id = new URLSearchParams(location.search).get('id');

function switchThumb(url,i){
  document.getElementById('main-img').src=url;
  document.querySelectorAll('.thumb').forEach((t,j)=>t.classList.toggle('active',i===j));
}
function changeQty(d){ qty=Math.max(1,qty+d); document.getElementById('qty-val').value=qty; }
function switchTab(n){
  document.querySelectorAll('.tab-btn,.tab-pane').forEach(e=>e.classList.remove('on'));
  document.querySelector(`[data-tab="${n}"]`).classList.add('on');
  document.getElementById('tab-'+n).classList.add('on');
}

function addToCart(){ if(prod) Cart.add({id:prod.id,name:prod.name,price:prod.price,image_url:prod.image_url},qty); }
function buyNow(){ addToCart(); location.href='/cart.html'; }

function toggleWish(){
  if(!prod)return;
  const now=WL.toggle(prod.id);
  const btn=document.getElementById('wish-btn');
  btn.classList.toggle('wished',now);
  btn.innerHTML=`<svg viewBox="0 0 24 24" width="17" height="17" fill="${now?'#ee0055':'none'}" stroke="${now?'#ee0055':'currentColor'}" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${now?'Wishlisted':'Wishlist'}`;
}

function render(p){
  prod=p;
  const disc=p.mrp&&p.mrp>p.price?Math.round((1-p.price/p.mrp)*100):0;
  const imgs=[p.image_url,...(p.images||[])].filter(Boolean);
  const w=WL.has(p.id);
  const specs=p.specifications||{};

  document.title=p.name+' – Aquanics';
  document.getElementById('bc-cat').textContent=p.categories?.name||'Products';
  document.getElementById('bc-cat').href='/products.html?cat='+(p.category_slug||'');
  document.getElementById('bc-name').textContent=p.name;

  document.getElementById('prod-layout').innerHTML=`
  <div class="prod-layout">
    <div class="gallery">
      <div class="gallery-main">
        <img id="main-img" src="${imgs[0]||''}" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'200\\' height=\\'200\\'><rect width=\\'200\\' height=\\'200\\' fill=\\'%23e4eeec\\'/><text x=\\'50%25\\' y=\\'50%25\\' font-size=\\'48\\' text-anchor=\\'middle\\' dominant-baseline=\\'middle\\'>🐠</text></svg>'" alt="${p.name}">
        <button class="gallery-zoom">⛶</button>
      </div>
      ${imgs.length>1?`<div class="thumbs">${imgs.map((img,i)=>`<div class="thumb${i===0?' active':''}" onclick="switchThumb('${img}',${i})"><img src="${img}" alt=""></div>`).join('')}</div>`:''}
    </div>
    <div class="prod-info">
      <span class="prod-cat-tag">${p.categories?.name||''}</span>
      <h1 class="prod-title">${p.name}</h1>
      <div class="prod-rating">
        <span class="stars-big">${fmt.stars(p.rating||4.5)}</span>
        <span class="rating-score">${(p.rating||4.5).toFixed(1)}</span>
        <span class="rating-cnt">(${p.review_count||0} reviews)</span>
        <span class="stock-pill ${p.in_stock===false?'out-stock':'in-stock'}">${p.in_stock===false?'Out of Stock':'✓ In Stock'}</span>
      </div>
      <div class="price-row">
        <span class="prod-price">${fmt.price(p.price)}</span>
        ${p.mrp&&p.mrp>p.price?`<span class="prod-mrp">${fmt.price(p.mrp)}</span>`:''}
        ${disc?`<span class="prod-disc">${disc}% OFF</span>`:''}
      </div>
      ${p.highlights?.length?`
      <div class="highlights">
        <h4>Key Highlights</h4>
        <ul>${p.highlights.map(h=>`<li>${h}</li>`).join('')}</ul>
      </div>`:''}
      <div class="qty-row">
        <span class="qty-label">Qty:</span>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <input class="qty-val" id="qty-val" type="number" value="1" min="1" max="99"
            onchange="qty=Math.max(1,parseInt(this.value)||1);this.value=qty">
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
      </div>
      <div class="prod-actions">
        <button class="btn btn-primary btn-lg" onclick="addToCart()" ${p.in_stock===false?'disabled':''}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Add to Cart
        </button>
        <button class="btn btn-ocean btn-lg" onclick="buyNow()" ${p.in_stock===false?'disabled':''}>Buy Now</button>
        <button class="btn-wish${w?' wished':''}" id="wish-btn" onclick="toggleWish()">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="${w?'#ee0055':'none'}" stroke="${w?'#ee0055':'currentColor'}" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          ${w?'Wishlisted':'Wishlist'}
        </button>
      </div>
      <div class="delivery-strip">
        <span>🚚 Free delivery on orders above ₹599</span>
        <span>🐠 DOA Policy — Dead on Arrival replacement guaranteed</span>
        <span>↩️ Easy returns within 7 days</span>
      </div>
      <div class="tabs">
        <div class="tab-nav">
          <button class="tab-btn on" data-tab="desc" onclick="switchTab('desc')">Description</button>
          <button class="tab-btn" data-tab="specs" onclick="switchTab('specs')">Specifications</button>
          <button class="tab-btn" data-tab="reviews" onclick="switchTab('reviews')">Reviews (${p.review_count||0})</button>
        </div>
        <div class="tab-pane on" id="tab-desc">
          <p style="font-size:14px;line-height:1.85;color:var(--gray4)">${p.description||'No description available.'}</p>
        </div>
        <div class="tab-pane" id="tab-specs">
          ${Object.keys(specs).length?`<table class="spec-table">${Object.entries(specs).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</table>`:'<p style="color:var(--gray3);font-size:13px">No specifications listed.</p>'}
        </div>
        <div class="tab-pane" id="tab-reviews">
          <div class="rev-summary">
            <div class="rev-big">
              <div class="num">${(p.rating||4.5).toFixed(1)}</div>
              <div class="stars">${fmt.stars(p.rating||4.5)}</div>
              <small>${p.review_count||0} reviews</small>
            </div>
            <div style="flex:1">${[5,4,3,2,1].map(n=>{
              const pct=n===Math.round(p.rating||4.5)?62:n===Math.floor(p.rating||4.5)?25:Math.max(0,(n-1)*5);
              return `<div class="bar-row"><span style="min-width:24px;text-align:right;color:var(--gray3)">${n}★</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><span style="color:var(--gray3);min-width:28px">${pct}%</span></div>`;
            }).join('')}</div>
          </div>
          <p style="color:var(--gray3);font-size:13px;text-align:center;padding:20px">Reviews load from Supabase after products are added.</p>
        </div>
      </div>
    </div>
  </div>`;
}

async function loadRelated(p){
  const data = await DB.related(p.category_slug,p.id).catch(()=>[]);
  if(!data.length)return;
  document.getElementById('related-wrap').style.display='block';
  document.getElementById('related-grid').innerHTML=data.map(x=>UI.card(x)).join('');
}

async function init(){
  await UI.nav();
  UI.footer();
  if(!id){ document.getElementById('prod-layout').innerHTML='<div style="padding:60px;text-align:center"><h3>Product not found</h3><a href="/products.html" class="btn btn-primary" style="margin-top:16px">Browse Products</a></div>'; return; }
  const p = await DB.product(id).catch(()=>null);
  if(!p){ document.getElementById('prod-layout').innerHTML='<div style="padding:60px;text-align:center"><h3>Product not found</h3><a href="/products.html" class="btn btn-primary" style="margin-top:16px">Browse Products</a></div>'; return; }
  render(p);
  loadRelated(p);
}
init();
</script>
</body>
</html>
