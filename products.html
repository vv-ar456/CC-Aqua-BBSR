<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Products – Aquanics</title>
  <link rel="icon" href="logo.png">
  
  <style>
    .layout{display:grid;grid-template-columns:260px 1fr;gap:28px;padding:28px 0 64px;align-items:start;}
    .sidebar{background:#fff;border-radius:var(--r2);padding:22px;position:sticky;top:90px;box-shadow:0 2px 16px rgba(0,212,170,.07);}
    .sidebar h3{font-family:var(--fd);font-size:15px;font-weight:700;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;}
    .sidebar h3 button{font-size:12px;color:var(--teal2);background:none;border:none;cursor:pointer;font-family:var(--fb);}
    .fg{margin-bottom:22px;}
    .fg-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gray3);margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
    .fg-title svg{width:13px;height:13px;transition:transform .2s;}
    .fg.closed .fg-title svg{transform:rotate(-90deg);}
    .fg.closed .fg-body{display:none;}
    .fcheck{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13.5px;color:var(--text);cursor:pointer;}
    .fcheck input{accent-color:var(--teal);width:15px;height:15px;}
    .price-inputs{display:flex;gap:8px;align-items:center;margin-top:8px;}
    .price-inputs input{width:88px;padding:7px 10px;border:1.5px solid var(--gray1);border-radius:8px;font-size:13px;font-family:var(--fb);outline:none;}
    .price-inputs input:focus{border-color:var(--teal);}
    .rtag{padding:5px 11px;border:1.5px solid var(--gray1);border-radius:20px;font-size:12px;cursor:pointer;background:none;font-family:var(--fb);transition:all .2s;}
    .rtag.on{background:var(--teal);color:var(--ocean);border-color:var(--teal);}

    /* main */
    .prod-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
    .prod-topbar h1{font-family:var(--fd);font-size:24px;font-weight:700;}
    .topbar-right{display:flex;align-items:center;gap:10px;}
    .sort-sel{padding:9px 14px;border:1.5px solid var(--gray1);border-radius:10px;font-size:13px;font-family:var(--fb);outline:none;cursor:pointer;background:#fff;}
    .sort-sel:focus{border-color:var(--teal);}
    .filter-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
    .fchip{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--teal);color:var(--ocean);border-radius:20px;font-size:12px;font-weight:600;}
    .fchip button{background:none;border:none;color:inherit;cursor:pointer;font-size:15px;line-height:1;padding:0;}
    .mob-filter-btn{display:none;align-items:center;gap:6px;}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;}
    @media(max-width:900px){
      .layout{grid-template-columns:1fr;}
      .sidebar{position:fixed;top:0;left:0;bottom:0;width:290px;z-index:201;border-radius:0;transform:translateX(-100%);transition:transform .3s var(--ease);overflow-y:auto;padding-top:52px;}
      .sidebar.open{transform:none;}
      .sidebar-overlay.open{display:block;}
      .mob-filter-btn{display:flex;}
      .sidebar-close{display:flex !important;}
    }
    .sidebar-close{display:none;position:absolute;top:14px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray3);}
    .results-label{font-size:13px;color:var(--gray3);margin-top:2px;}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="navbar"></div>
<div class="sidebar-overlay" id="sov" onclick="closeSidebar()"></div>

<div class="container">
  <div class="breadcrumb" id="bc">
    <a href="index.html">Home</a><span class="breadcrumb-sep">›</span>
    <span id="bc-label">All Products</span>
  </div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-close" onclick="closeSidebar()">✕</button>
      <h3>Filters <button onclick="clearFilters()">Clear All</button></h3>

      <div class="fg" id="fg-sub">
        <div class="fg-title" onclick="toggleFG(this)">
          Subcategory
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="fg-body" id="sub-list"></div>
      </div>

      <div class="fg">
        <div class="fg-title" onclick="toggleFG(this)">
          Price Range
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="fg-body">
          <div class="price-inputs">
            <input type="number" id="fmin" placeholder="Min ₹">
            <span style="color:var(--gray2)">—</span>
            <input type="number" id="fmax" placeholder="Max ₹">
          </div>
          <button class="btn btn-ghost btn-sm" style="margin-top:10px;width:100%" onclick="applyPrice()">Apply</button>
        </div>
      </div>

      <div class="fg">
        <div class="fg-title" onclick="toggleFG(this)">
          Rating
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="fg-body" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">
          <button class="rtag" onclick="setRating(4.5,this)">★ 4.5+</button>
          <button class="rtag" onclick="setRating(4,this)">★ 4+</button>
          <button class="rtag" onclick="setRating(3,this)">★ 3+</button>
        </div>
      </div>

      <div class="fg">
        <label class="fcheck"><input type="checkbox" id="f-featured" onchange="loadProds()"> Featured only</label>
        <label class="fcheck"><input type="checkbox" id="f-disc" onchange="loadProds()"> On Discount</label>
      </div>
    </aside>

    <main>
      <div class="prod-topbar">
        <div>
          <h1 id="page-title">All Products</h1>
          <div class="results-label" id="res-label">Loading…</div>
        </div>
        <div class="topbar-right">
          <button class="btn btn-ghost btn-sm mob-filter-btn" onclick="openSidebar()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            Filters
          </button>
          <select class="sort-sel" id="sort-sel" onchange="loadProds()">
            <option value="newest">Newest First</option>
            <option value="price_asc">Price: Low → High</option>
            <option value="price_desc">Price: High → Low</option>
            <option value="rating">Top Rated</option>
            <option value="bestsellers">Best Selling</option>
          </select>
        </div>
      </div>

      <div class="filter-chips" id="chips"></div>
      <div class="products-grid" id="prod-grid"></div>
      <div class="pagination" id="pg"></div>
    </main>
  </div>
</div>

<a href="https://wa.me/919999999999" target="_blank" class="wa-float">
  <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
</a>
<div id="footer"></div>

<script src="js/app.js"></script>
<script src="js/app.js"></script>
<script>
const PER = 20;
const P = new URLSearchParams(location.search);
let F = {
  cat: P.get('cat')||'', sub: P.get('sub')||'',
  search: P.get('search')||'', sort: P.get('sort')||'newest',
  minP:'', maxP:'', rating:'', featured:false, disc:false, page:1
};

function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sov').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sov').classList.remove('open'); }
function toggleFG(el)   { el.closest('.fg').classList.toggle('closed'); }

function clearFilters() {
  F = {...F, sub:'', minP:'', maxP:'', rating:'', featured:false, disc:false, page:1};
  document.getElementById('fmin').value=''; document.getElementById('fmax').value='';
  document.querySelectorAll('.rtag').forEach(r=>r.classList.remove('on'));
  document.getElementById('f-featured').checked=false;
  document.getElementById('f-disc').checked=false;
  document.querySelectorAll('#sub-list input').forEach(i=>i.checked=false);
  loadProds();
}

function applyPrice() { F.minP=document.getElementById('fmin').value; F.maxP=document.getElementById('fmax').value; F.page=1; loadProds(); }
function setRating(r,btn) { F.rating=r; F.page=1; document.querySelectorAll('.rtag').forEach(x=>x.classList.remove('on')); btn.classList.add('on'); loadProds(); }

function renderChips() {
  const c = document.getElementById('chips');
  const tags=[];
  if(F.search) tags.push({label:`"${F.search}"`,key:'search'});
  if(F.minP||F.maxP) tags.push({label:`₹${F.minP||0}–₹${F.maxP||'∞'}`,key:'price'});
  if(F.rating) tags.push({label:`★ ${F.rating}+`,key:'rating'});
  if(F.featured) tags.push({label:'Featured',key:'featured'});
  c.innerHTML = tags.map(t=>`<span class="fchip">${t.label}<button onclick="removeChip('${t.key}')">×</button></span>`).join('');
}

function removeChip(k) {
  if(k==='price'){F.minP='';F.maxP='';}
  else if(k==='rating'){F.rating='';document.querySelectorAll('.rtag').forEach(x=>x.classList.remove('on'));}
  else F[k]='';
  F.page=1; loadProds();
}

function renderPg(total) {
  const pages=Math.ceil(total/PER), el=document.getElementById('pg');
  if(pages<=1){el.innerHTML='';return;}
  let h=`<button class="pg-btn" onclick="goPage(${F.page-1})" ${F.page===1?'disabled':''}>❮</button>`;
  const start=Math.max(1,F.page-2), end=Math.min(pages,start+4);
  for(let i=start;i<=end;i++) h+=`<button class="pg-btn${i===F.page?' active':''}" onclick="goPage(${i})">${i}</button>`;
  if(end<pages) h+=`<span style="color:var(--gray3);padding:0 6px">…</span><button class="pg-btn" onclick="goPage(${pages})">${pages}</button>`;
  h+=`<button class="pg-btn" onclick="goPage(${F.page+1})" ${F.page===pages?'disabled':''}>❯</button>`;
  el.innerHTML=h;
}

function goPage(p){F.page=p;loadProds();window.scrollTo({top:0,behavior:'smooth'});}

async function loadProds() {
  const grid=document.getElementById('prod-grid');
  grid.innerHTML=UI.skels(12);
  renderChips();

  F.sort = document.getElementById('sort-sel').value;
  F.featured = document.getElementById('f-featured').checked;
  F.disc = document.getElementById('f-disc').checked;

  try {
    let q = sb.from('products').select('*,categories(name,slug)',{count:'exact'}).eq('active',true);
    if(F.cat)     q=q.eq('category_slug',F.cat);
    if(F.sub)     q=q.eq('subcategory_slug',F.sub);
    if(F.search)  q=q.ilike('name','%'+F.search+'%');
    if(F.minP)    q=q.gte('price',F.minP);
    if(F.maxP)    q=q.lte('price',F.maxP);
    if(F.rating)  q=q.gte('rating',F.rating);
    if(F.featured)q=q.eq('featured',true);
    if(F.disc)    q=q.not('mrp','is',null);

    if(F.sort==='price_asc')   q=q.order('price',{ascending:true});
    else if(F.sort==='price_desc') q=q.order('price',{ascending:false});
    else if(F.sort==='rating') q=q.order('rating',{ascending:false});
    else if(F.sort==='bestsellers') q=q.order('sales_count',{ascending:false});
    else q=q.order('created_at',{ascending:false});

    q=q.range((F.page-1)*PER, F.page*PER-1);
    const {data,count,error}=await q;
    if(error) throw error;

    document.getElementById('res-label').textContent=`Showing ${data.length} of ${count||0} results`;
    grid.innerHTML = data.length ? data.map(p=>UI.card(p)).join('') :
      `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--gray3)">
        <div style="font-size:48px;margin-bottom:12px">🔍</div>
        <p style="font-size:16px">No products found.</p>
        <button class="btn btn-ghost btn-sm" style="margin-top:12px" onclick="clearFilters()">Clear filters</button>
      </div>`;
    renderPg(count||0);
    initReveal();
  } catch(e){
    grid.innerHTML=`<p style="grid-column:1/-1;color:var(--gray3);padding:20px">Error loading products.</p>`;
  }
}

async function loadSubcats() {
  if(!F.cat) return;
  const cats = await DB.cats().catch(()=>[]);
  const cat  = cats.find(c=>c.slug===F.cat);
  const list = document.getElementById('sub-list');
  if(!cat?.subcategories?.length){ document.getElementById('fg-sub').style.display='none'; return; }
  list.innerHTML = cat.subcategories.map(s=>`
    <label class="fcheck">
      <input type="checkbox" value="${s.slug}" ${F.sub===s.slug?'checked':''}
        onchange="F.sub=this.checked?this.value:'';F.page=1;loadProds()">
      ${s.name}
    </label>`).join('');
}

async function init() {
  // Set page title
  document.getElementById('sort-sel').value = F.sort;
  if(F.search) {
    document.getElementById('page-title').textContent=`Results for "${F.search}"`;
    document.getElementById('bc-label').textContent=`Search`;
  } else if(F.cat) {
    const cats = await DB.cats().catch(()=>[]);
    const c = cats.find(x=>x.slug===F.cat);
    if(c){ document.getElementById('page-title').textContent=c.name; document.getElementById('bc-label').textContent=c.name; document.title=c.name+' – Aquanics'; }
  }

  await UI.nav(F.cat);
  UI.footer();
  loadSubcats();
  loadProds();
}
init();
</script>
<script src="js/chat-widget.js"></script>
<script src="js/cart-ai.js"></script>
</body>
</html>
