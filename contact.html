<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us – Aquanics</title>
  <link rel="icon" href="logo.png">
  
  <style>
    .contact-wrap{display:grid;grid-template-columns:1fr 1fr;gap:40px;padding:48px 0 80px;align-items:start;}
    .contact-info h2{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--ocean-dark);margin-bottom:10px;}
    .contact-info p{font-size:14px;color:var(--gray-600);line-height:1.8;margin-bottom:28px;}
    .contact-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--gray-200);}
    .contact-item:last-child{border-bottom:none;}
    .ci-icon{width:44px;height:44px;background:var(--gray-100);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .ci-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--gray-400);margin-bottom:3px;}
    .ci-val{font-size:14px;font-weight:600;color:var(--text);}
    .ci-val a{color:var(--teal);}
    
    
    .contact-form-card{background:#fff;border-radius:var(--radius-lg);padding:32px;box-shadow:var(--shadow-md);}
    .contact-form-card h3{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:20px;}
    .cf-field{margin-bottom:16px;}
    .cf-field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:var(--gray-600);margin-bottom:5px;}
    .cf-field input,.cf-field select,.cf-field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:14px;font-family:var(--font-body);outline:none;transition:var(--transition);}
    .cf-field input:focus,.cf-field select:focus,.cf-field textarea:focus{border-color:var(--teal);}
    .cf-field textarea{resize:vertical;min-height:110px;}
    @media(max-width:768px){.contact-wrap{grid-template-columns:1fr;}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ── Anti-Inspect Protection ────────────────────────────────
(function(){
  // Disable right-click
  document.addEventListener('contextmenu', e => e.preventDefault());
  // Disable common keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (
      e.key === 'F12' ||
      (e.ctrlKey && e.shiftKey && ['I','J','C','K'].includes(e.key.toUpperCase())) ||
      (e.ctrlKey && e.key.toUpperCase() === 'U') ||
      (e.metaKey && e.altKey && ['I','J','C'].includes(e.key.toUpperCase()))
    ) { e.preventDefault(); return false; }
  });
  // Detect DevTools open via size heuristic
  let devOpen = false;
  const threshold = 160;
  function checkDev() {
    const wDiff = window.outerWidth - window.innerWidth;
    const hDiff = window.outerHeight - window.innerHeight;
    if (wDiff > threshold || hDiff > threshold) {
      if (!devOpen) {
        devOpen = true;
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;flex-direction:column;gap:16px"><div style="font-size:48px">🔒</div><h2>Access Restricted</h2><p>Developer tools are not allowed.</p><button onclick="location.reload()" style="padding:10px 24px;background:#00a882;color:#fff;border:none;border-radius:8px;cursor:pointer">Reload</button></div>';
      }
    } else {
      devOpen = false;
    }
  }
  setInterval(checkDev, 1000);
  // Disable text selection on sensitive areas
  document.addEventListener('selectstart', e => {
    if (e.target.closest('.prod-price,.prod-name,.big-price')) e.preventDefault();
  });
})();
</script>
</head>
<body>
<header id="navbar"></header>
<div class="container">
  <div class="contact-wrap">
    <div class="contact-info">
      <h2>Get in Touch</h2>
      <p>Have questions about an order, a product, or need expert advice on aquarium setup or pet care? We're here to help!</p>
      <div class="contact-item">
        <div class="ci-icon">📞</div>
        <div><div class="ci-label">Phone</div><div class="ci-val"><a href="tel:+91XXXXXXXXXX">+91-XXXX-XXXXXX</a></div></div>
      </div>
      <div class="contact-item">
        <div class="ci-icon">✉️</div>
        <div><div class="ci-label">Email</div><div class="ci-val"><a href="mailto:support@aquanics.in">support@aquanics.in</a></div></div>
      </div>
      <div class="contact-item">
        <div class="ci-icon">📍</div>
        <div><div class="ci-label">Location</div><div class="ci-val">Bhubaneswar, Odisha, India</div></div>
      </div>
      <div class="contact-item">
        <div class="ci-icon">🕐</div>
        <div><div class="ci-label">Support Hours</div><div class="ci-val">Mon–Sat, 9 AM – 7 PM</div></div>
      </div>
      
    </div>

    <div class="contact-form-card">
      <h3>Send Us a Message</h3>
      <div id="form-msg"></div>
      <div class="cf-field"><label>Your Name *</label><input type="text" id="cf-name" placeholder="Full name"></div>
      <div class="cf-field"><label>Phone / Email *</label><input type="text" id="cf-contact" placeholder="+91 or email"></div>
      <div class="cf-field"><label>Topic</label>
        <select id="cf-topic">
          <option>General Query</option>
          <option>Order Issue</option>
          <option>DOA Claim</option>
          <option>Product Info</option>
          <option>Feedback</option>
        </select>
      </div>
      <div class="cf-field"><label>Message *</label><textarea id="cf-msg" placeholder="Tell us how we can help…"></textarea></div>
      <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center" onclick="submitContact()">Send Message</button>
    </div>
  </div>
</div>

<footer id="footer"></footer>
<script src="js/app.js"></script>
<script src="js/app.js"></script>
<script>
async function init() { await UI.nav(); UI.footer(); }
init();

async function submitContact() {
  const name    = document.getElementById('cf-name').value.trim();
  const contact = document.getElementById('cf-contact').value.trim();
  const topic   = document.getElementById('cf-topic').value;
  const msg     = document.getElementById('cf-msg').value.trim();
  const msgEl   = document.getElementById('form-msg');

  if (!name || !contact || !msg) {
    msgEl.innerHTML = '<div class="alert alert-error">Please fill in all required fields.</div>';
    return;
  }

  const { error } = await sb.from('support_tickets').insert([{
    message: `[${topic}] From: ${name} (${contact})\n\n${msg}`,
    status: 'open',
    created_at: new Date().toISOString()
  }]);

  if (error) {
    msgEl.innerHTML = '<div class="alert alert-error">Failed to send. Please WhatsApp us directly.</div>';
    return;
  }

  msgEl.innerHTML = '<div class="alert alert-success">✓ Message sent! We\'ll get back to you within 24 hours.</div>';
  ['cf-name','cf-contact','cf-msg'].forEach(id => document.getElementById(id).value = '');
}
</script>
<script src="js/chat-widget.js"></script>
<script src="js/cart-ai.js"></script>
</body>
</html>
