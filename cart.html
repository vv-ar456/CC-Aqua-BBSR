<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart & Checkout – Aquanics</title>
  <link rel="icon" href="logo.png">
  
  <style>
    .checkout-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 28px;
      padding: 32px 0 64px;
      align-items: start;
    }

    /* STEPS */
    .checkout-steps {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 28px;
      background: #fff;
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(26,122,110,0.08);
    }
    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    .step-num {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--gray-200);
      color: var(--gray-400);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
      flex-shrink: 0;
    }
    .step.active .step-num { background: var(--teal); color: #fff; }
    .step.done .step-num { background: #22a898; color: #fff; }
    .step-label { font-size: 13px; font-weight: 600; color: var(--gray-400); }
    .step.active .step-label, .step.done .step-label { color: var(--text); }
    .step-sep { flex: 1; height: 2px; background: var(--gray-200); max-width: 60px; }
    .step.done + .step-sep { background: var(--teal); }

    /* CART ITEMS */
    .cart-section {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 2px 12px rgba(26,122,110,0.08);
    }
    .cart-section h2 {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--gray-100);
    }

    .cart-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--gray-100);
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-img {
      width: 80px; height: 80px;
      border-radius: 10px;
      overflow: hidden;
      background: var(--gray-100);
    }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .cart-item-price { font-size: 15px; font-weight: 700; color: var(--ocean); }

    .item-qty-ctrl {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .iq-btn {
      width: 28px; height: 28px;
      border: 1.5px solid var(--gray-200);
      background: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .iq-btn:hover { border-color: var(--teal); color: var(--teal); }
    .iq-num {
      font-size: 14px;
      font-weight: 600;
      min-width: 24px;
      text-align: center;
    }

    .item-remove {
      font-size: 12px;
      color: #e05;
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font-body);
      margin-top: 4px;
    }
    .item-remove:hover { text-decoration: underline; }

    .cart-item-total {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      color: var(--ocean);
      text-align: right;
    }

    /* ADDRESS */
    .address-section {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 2px 12px rgba(26,122,110,0.08);
      margin-top: 20px;
    }
    .address-section h2 {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .address-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .address-form .field { margin-bottom: 0; }
    .address-form .field.full { grid-column: 1 / -1; }
    .address-form input, .address-form select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: 13.5px;
      font-family: var(--font-body);
      outline: none;
      transition: var(--transition);
    }
    .address-form input:focus { border-color: var(--teal); }
    .address-form label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: 5px;
    }

    /* ORDER SUMMARY */
    .order-summary {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 2px 12px rgba(26,122,110,0.08);
      position: sticky;
      top: 100px;
    }
    .order-summary h2 {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--gray-100);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 14px;
    }
    .summary-row.total {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
      border-top: 2px solid var(--gray-100);
      margin-top: 8px;
      padding-top: 14px;
      color: var(--ocean);
    }
    .summary-row .label { color: var(--gray-600); }
    .summary-row .val { font-weight: 600; }
    .summary-row.discount .val { color: var(--teal); }

    .promo-row {
      display: flex;
      gap: 8px;
      margin: 16px 0;
    }
    .promo-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--font-body);
      outline: none;
    }
    .promo-row input:focus { border-color: var(--teal); }

    .pay-btn {
      width: 100%;
      background: var(--teal);
      color: #fff;
      border: none;
      padding: 15px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font-display);
      cursor: pointer;
      margin-top: 20px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .pay-btn:hover { background: var(--teal-dark); }
    .pay-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .secure-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 12px;
    }

    .payment-logos {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .pay-logo {
      background: var(--gray-100);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-600);
    }

    .empty-cart {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-cart h3 { font-size: 20px; margin-bottom: 8px; }
    .empty-cart p { color: var(--gray-400); font-size: 14px; margin-bottom: 24px; }

    @media (max-width: 900px) {
      .checkout-layout { grid-template-columns: 1fr; }
      .order-summary { position: static; }
      .address-form { grid-template-columns: 1fr; }
      .address-form .field.full { grid-column: 1; }
    }
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

.schedule-notice {

<script>
// ── Anti-Inspect Protection ────────────────────────────────
(function(){
  // Disable right-click
  document.addEventListener('contextmenu', e => e.preventDefault());
  // Disable common keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (
      e.key === 'F12' ||
      (e.ctrlKey && e.shiftKey && ['I','J','C','K'].includes(e.key.toUpperCase())) ||
      (e.ctrlKey && e.key.toUpperCase() === 'U') ||
      (e.metaKey && e.altKey && ['I','J','C'].includes(e.key.toUpperCase()))
    ) { e.preventDefault(); return false; }
  });
  // Detect DevTools open via size heuristic
  let devOpen = false;
  const threshold = 160;
  function checkDev() {
    const wDiff = window.outerWidth - window.innerWidth;
    const hDiff = window.outerHeight - window.innerHeight;
    if (wDiff > threshold || hDiff > threshold) {
      if (!devOpen) {
        devOpen = true;
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;flex-direction:column;gap:16px"><div style="font-size:48px">🔒</div><h2>Access Restricted</h2><p>Developer tools are not allowed.</p><button onclick="location.reload()" style="padding:10px 24px;background:#00a882;color:#fff;border:none;border-radius:8px;cursor:pointer">Reload</button></div>';
      }
    } else {
      devOpen = false;
    }
  }
  setInterval(checkDev, 1000);
  // Disable text selection on sensitive areas
  document.addEventListener('selectstart', e => {
    if (e.target.closest('.prod-price,.prod-name,.big-price')) e.preventDefault();
  });
})();
</script>

<header id="navbar"></header>

<div class="container">
  <!-- STEPS -->
  <div class="checkout-steps">
    <div class="step done" id="step-cart">
      <div class="step-num">1</div>
      <span class="step-label">Cart</span>
    </div>
    <div class="step-sep"></div>
    <div class="step active" id="step-delivery">
      <div class="step-num">2</div>
      <span class="step-label">Delivery</span>
    </div>
    <div class="step-sep"></div>
    <div class="step" id="step-payment">
      <div class="step-num">3</div>
      <span class="step-label">Payment</span>
    </div>
  </div>

  <!-- AI Cart Advisor inline banner -->
<div id="ai-inline-banner" style="
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  border-radius:16px;padding:16px 20px;margin-bottom:20px;
  display:flex;align-items:center;gap:14px;cursor:pointer;

" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 28px rgba(79,70,229,.35)'"

   onclick="document.getElementById('ai-fab-btn').click()">

<script>
const DELIVERY_FEE_THRESHOLD = 599;
const DELIVERY_FEE = 49;
let appliedPromo = null;

function getDeliveryFee(subtotal) {
  return subtotal >= DELIVERY_FEE_THRESHOLD ? 0 : DELIVERY_FEE;
}

function getDiscount(subtotal) {
  if (!appliedPromo) return 0;
  if (appliedPromo.type === 'percent') return Math.round(subtotal * appliedPromo.value / 100);
  return appliedPromo.value;
}

function renderCart() {
  const items = Cart.get();
  const contentEl = document.getElementById('cart-content');

  if (!items.length) {
    contentEl.innerHTML = `
        <div id='schedule-notice' class='schedule-notice'></div>
      <div class="empty-cart">
        <div style="font-size:60px;margin-bottom:16px">🛒</div>
        <h3>Your cart is empty</h3>
        <p>Add some items to get started</p>
        <a href="products.html" class="btn btn-primary btn-lg">Browse Products</a>
      </div>
    `;
    return;
  }

  const subtotal = Cart.total();
  const delivery = getDeliveryFee(subtotal);
  const discount = getDiscount(subtotal);
  const total = subtotal + delivery - discount;

  contentEl.innerHTML = `
    <div class="checkout-layout">
      <div>
        <!-- CART ITEMS -->
        <div class="cart-section">
          <h2>🛒 Cart (${Cart.count()} items)</h2>
          ${items.map(item => `
            <div class="cart-item">
              <div class="cart-item-img">
                <img src="${item.image_url || '/assets/placeholder.jpg'}" alt="${item.name}">
              </div>
              <div>
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-price">${fmt.price(item.price)}</div>
                <div class="item-qty-ctrl">
                  <button class="iq-btn" onclick="updateQty(${item.id}, ${item.qty - 1})">−</button>
                  <span class="iq-num">${item.qty}</span>
                  <button class="iq-btn" onclick="updateQty(${item.id}, ${item.qty + 1})">+</button>
                  <button class="item-remove" onclick="removeItem(${item.id})">Remove</button>
                </div>
              </div>
              <div class="cart-item-total">${fmt.price(item.price * item.qty)}</div>
            </div>
          `).join('')}
        </div>

        <!-- MAP + ADDRESS -->
        <div class="map-section">
          <h3>📍 Pin Your Delivery Location</h3>
          <p>Drop a pin on the map to confirm your exact delivery location — like Swiggy & Zomato.</p>
          <button class="map-locate-btn" id="locate-btn" onclick="locateMe()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M1 12h4M19 12h4"/></svg>
            Use My Current Location
          </button>
          <div id="delivery-map"></div>
          <div class="map-pin-hint">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            Tap anywhere on the map to move the pin
          </div>
          <div class="map-selected-addr" id="map-addr-display"></div>
          <input type="hidden" id="map-lat" value="">
          <input type="hidden" id="map-lng" value="">
        </div>

        <div class="address-section">
          <h2>📋 Delivery Details</h2>
          <div class="address-form">
            <div class="field">
              <label>Full Name *</label>
              <input type="text" id="addr-name" placeholder="Recipient name" value="${Auth.getUser()?.name || ''}">
            </div>
            <div class="field">
              <label>Phone *</label>
              <input type="tel" id="addr-phone" placeholder="10-digit number" maxlength="10" inputmode="numeric" value="${Auth.getUser()?.phone || ''}">
            </div>
            <div class="field full">
              <label>House / Flat / Building *</label>
              <input type="text" id="addr-line1" placeholder="House no., flat, building name">
            </div>
            <div class="field full">
              <label>Street / Area / Locality</label>
              <input type="text" id="addr-line2" placeholder="Auto-filled from map or enter manually">
            </div>
            <div class="field">
              <label>City *</label>
              <input type="text" id="addr-city" placeholder="City">
            </div>
            <div class="field">
              <label>State *</label>
              <select id="addr-state">
                <option value="">Select State</option>
                ${['Andhra Pradesh','Arunachal Pradesh','Assam','Bihar','Chhattisgarh','Goa','Gujarat','Haryana','Himachal Pradesh','Jharkhand','Karnataka','Kerala','Madhya Pradesh','Maharashtra','Manipur','Meghalaya','Mizoram','Nagaland','Odisha','Punjab','Rajasthan','Sikkim','Tamil Nadu','Telangana','Tripura','Uttar Pradesh','Uttarakhand','West Bengal','Delhi','Jammu & Kashmir'].map(s => `<option>${s}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>PIN Code *</label>
              <input type="text" id="addr-pin" placeholder="6-digit PIN" maxlength="6" inputmode="numeric">
            </div>
          </div>
        </div>
      </div>

      <!-- ORDER SUMMARY -->
      <div class="order-summary">
        <h2>Order Summary</h2>
        <div class="summary-row">
          <span class="label">Subtotal (${Cart.count()} items)</span>
          <span class="val">${fmt.price(subtotal)}</span>
        </div>
        <div class="summary-row">
          <span class="label">Delivery Fee</span>
          <span class="val ${delivery === 0 ? '' : ''}">${delivery === 0 ? '<span style="color:var(--teal)">FREE</span>' : fmt.price(delivery)}</span>
        </div>
        ${discount ? `
          <div class="summary-row discount">
            <span class="label">Discount (${appliedPromo.code})</span>
            <span class="val">−${fmt.price(discount)}</span>
          </div>
        ` : ''}
        ${delivery > 0 ? `<p style="font-size:11px;color:var(--teal);text-align:right;margin-top:-4px">Add ${fmt.price(DELIVERY_FEE_THRESHOLD - subtotal)} more for free delivery</p>` : ''}

        <div class="promo-row">
          <input type="text" id="promo-input" placeholder="Promo code" style="text-transform:uppercase">
          <button class="btn btn-outline btn-sm" onclick="applyPromo()">Apply</button>
        </div>
        <div id="promo-msg"></div>

        <div class="summary-row total">
          <span>Total</span>
          <span>${fmt.price(total)}</span>
        </div>

        <button class="pay-btn" onclick="proceedToPayment()">
          🔒 Pay ${fmt.price(total)}
        </button>

        <div class="secure-badge">
          🛡️ Safe & Secure Checkout
        </div>

        <div class="payment-logos">
          <span class="pay-logo">VISA</span>
          <span class="pay-logo">Mastercard</span>
          <span class="pay-logo">UPI</span>
          <span class="pay-logo">Net Banking</span>
          <span class="pay-logo">Razorpay</span>
        </div>
      </div>
    </div>
  `;
}

function updateQty(id, qty) {
  Cart.updateQty(id, qty);
  renderCart();
  renderScheduleNotice();
  setTimeout(initDeliveryMap, 200); // init map after DOM renders
}

function removeItem(id) {
  Cart.remove(id);
  renderCart();
}

async function applyPromo() {
  const code = document.getElementById('promo-input').value.trim().toUpperCase();
  if (!code) return;
  const msgEl = document.getElementById('promo-msg');

  try {
    const { data, error } = await sb.from('promo_codes').select('*').eq('code', code).eq('active', true).single();
    if (error || !data) { msgEl.innerHTML = '<div class="alert alert-error">Invalid promo code</div>'; return; }
    if (data.expires_at && new Date(data.expires_at) < new Date()) {
      msgEl.innerHTML = '<div class="alert alert-error">This promo code has expired</div>'; return;
    }
    appliedPromo = data;
    msgEl.innerHTML = `<div class="alert alert-success">✓ Promo applied: ${data.description}</div>`;
    renderCart();
  } catch(e) {
    msgEl.innerHTML = '<div class="alert alert-error">Could not apply promo code</div>';
  }
}


// ════════════════════════════════════════
//  DELIVERY MAP (Leaflet + OpenStreetMap)
// ════════════════════════════════════════
let _map = null, _marker = null;

function initDeliveryMap() {
  if (_map) return;
  // Default: center of India
  const defaultLat = 20.5937, defaultLng = 78.9629, defaultZoom = 5;
  _map = L.map('delivery-map', { zoomControl: true, scrollWheelZoom: false }).setView([defaultLat, defaultLng], defaultZoom);

  // Tile layer
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19,
  }).addTo(_map);

  // Custom pin icon
  const pinIcon = L.divIcon({
    html: `<div style="position:relative;display:inline-block">
      <svg width="36" height="46" viewBox="0 0 36 46" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 0C8.06 0 0 8.06 0 18c0 13.5 18 28 18 28s18-14.5 18-28C36 8.06 27.94 0 18 0z" fill="#00a882"/>
        <circle cx="18" cy="18" r="8" fill="white"/>
        <circle cx="18" cy="18" r="5" fill="#00a882"/>
      </svg>
      <div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:12px;height:4px;background:rgba(0,0,0,.2);border-radius:50%;filter:blur(2px)"></div>
    </div>`,
    iconSize: [36, 50],
    iconAnchor: [18, 50],
    popupAnchor: [0, -50],
  });

  // Click on map to place pin
  _map.on('click', function(e) {
    placePin(e.latlng.lat, e.latlng.lng, true);
  });

  // Try to get user location on map init
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => placePin(pos.coords.latitude, pos.coords.longitude, true, 15),
      () => {} // silent fail
    );
  }

  window._pinIcon = pinIcon;
}

async function placePin(lat, lng, reverseGeocode = true, zoom = null) {
  document.getElementById('map-lat').value = lat.toFixed(6);
  document.getElementById('map-lng').value = lng.toFixed(6);

  if (_marker) {
    _marker.setLatLng([lat, lng]);
  } else {
    _marker = L.marker([lat, lng], { icon: window._pinIcon, draggable: true }).addTo(_map);
    _marker.on('dragend', function(e) {
      const pos = e.target.getLatLng();
      placePin(pos.lat, pos.lng, true);
    });
  }

  if (zoom) _map.setView([lat, lng], zoom);
  else _map.panTo([lat, lng]);

  if (reverseGeocode) {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=en`);
      const data = await res.json();
      const addr = data.address || {};
      // Auto-fill form fields
      const road   = addr.road || addr.pedestrian || addr.footway || '';
      const suburb = addr.suburb || addr.neighbourhood || addr.quarter || '';
      const city   = addr.city || addr.town || addr.village || addr.county || '';
      const state  = addr.state || '';
      const pin    = addr.postcode || '';
      const display = data.display_name || '';

      if (road || suburb) document.getElementById('addr-line2').value = [road, suburb].filter(Boolean).join(', ');
      if (city)  document.getElementById('addr-city').value = city;
      if (pin)   document.getElementById('addr-pin').value  = pin.replace(/\s/g,'').slice(0,6);

      // Auto-select state
      if (state) {
        const stateEl = document.getElementById('addr-state');
        for (let i = 0; i < stateEl.options.length; i++) {
          if (stateEl.options[i].text.toLowerCase().includes(state.toLowerCase()) ||
              state.toLowerCase().includes(stateEl.options[i].text.toLowerCase())) {
            stateEl.selectedIndex = i; break;
          }
        }
      }

      // Show selected location
      const addrDisplay = document.getElementById('map-addr-display');
      addrDisplay.innerHTML = `<strong>📍 Pinned Location:</strong><br>${display}`;
      addrDisplay.classList.add('show');

      // Add popup on marker
      _marker.bindPopup(`<div style="font-size:12px;max-width:200px"><strong>📍 Your delivery here</strong><br>${[road,suburb,city].filter(Boolean).join(', ')}</div>`).openPopup();
    } catch(e) {
      console.warn('Reverse geocode failed:', e.message);
    }
  }
}

async function locateMe() {
  const btn = document.getElementById('locate-btn');
  btn.disabled = true;
  btn.innerHTML = '<span style="display:inline-block;animation:spin .8s linear infinite">↻</span> Locating…';
  try {
    await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(
        pos => { placePin(pos.coords.latitude, pos.coords.longitude, true, 17); resolve(); },
        err => reject(err),
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });
  } catch(e) {
    alert('Could not get location. Please allow location access or pin manually on the map.');
  }
  btn.disabled = false;
  btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M1 12h4M19 12h4"/></svg> Use My Current Location';
}

// Add lat/lng to address collection
const _origGetAddr = window.getAddress;
function getAddress() {
  return {
    name: document.getElementById('addr-name')?.value?.trim(),
    lat: document.getElementById('map-lat')?.value || null,
    lng: document.getElementById('map-lng')?.value || null,
    phone: document.getElementById('addr-phone')?.value?.trim(),
    line1: document.getElementById('addr-line1')?.value?.trim(),
    line2: document.getElementById('addr-line2')?.value?.trim(),
    city: document.getElementById('addr-city')?.value?.trim(),
    state: document.getElementById('addr-state')?.value,
    pin: document.getElementById('addr-pin')?.value?.trim(),
  };
}

function validateAddress(addr) {
  if (!addr.name) return 'Please enter recipient name';
  if (!/^[6-9]\d{9}$/.test(addr.phone)) return 'Please enter a valid phone number';
  if (!addr.line1) return 'Please enter your address';
  if (!addr.city) return 'Please enter city';
  if (!addr.state) return 'Please select state';
  if (!/^\d{6}$/.test(addr.pin)) return 'Please enter a valid 6-digit PIN code';
  return null;
}

async function proceedToPayment() {
  if (!Auth.isLoggedIn()) {
    window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
    return;
  }

  const addr = getAddress();
  const err = validateAddress(addr);
  if (err) { alert(err); return; }

  const items = Cart.get();
  const subtotal = Cart.total();
  const delivery = getDeliveryFee(subtotal);
  const discount = getDiscount(subtotal);
  const total = subtotal + delivery - discount;

  const user = Auth.getUser();

  const options = {
    key: RAZORPAY_KEY,
    amount: total * 100, // paise
    currency: 'INR',
    name: 'Aquanics',
    description: `Order (${items.length} items)`,
    image: '/logo.png',
    prefill: {
      name: addr.name,
      contact: '+91' + addr.phone,
      email: user?.email || ''
    },
    theme: { color: '#1a7a6e' },
    handler: async function(response) {
      await handlePaymentSuccess(response, items, addr, total);
    },
    modal: {
      ondismiss: function() {
        document.querySelector('.pay-btn').disabled = false;
        document.querySelector('.pay-btn').innerHTML = `🔒 Pay ${fmt.price(total)}`;
      }
    }
  };

  document.querySelector('.pay-btn').disabled = true;
  document.querySelector('.pay-btn').textContent = 'Opening payment…';

  const rzp = new Razorpay(options);
  rzp.open();
}

async function handlePaymentSuccess(response, items, addr, total) {
  try {
    const user = Auth.getUser();
    const { data: order, error } = await sb.from('orders').insert([{
      user_id: user.id,
      items: items,
      address: addr,
      subtotal: Cart.total(),
      delivery_fee: getDeliveryFee(Cart.total()),
      discount: getDiscount(Cart.total()),
      total: total,
      payment_id: response.razorpay_payment_id,
      payment_status: 'paid',
      status: 'confirmed',
      promo_code: appliedPromo?.code || null,
      created_at: new Date().toISOString()
    }]).select().single();

    if (error) throw error;

    // Update sales count
    for (const item of items) {
      await sb.rpc('increment_sales', { product_id: item.id, qty: item.qty });
    }

    Cart.clear();
    window.location.href = `/order-success.html?id=${order.id}`;
  } catch(e) {
    alert('Payment received but order saving failed. Please contact support with payment ID: ' + response.razorpay_payment_id);
  }
}

async function init() {
  await UI.nav();
  UI.footer();
  renderCart();
}

init();
</script>

<script>
// ── ORDER Scheduling (IST 8:30 PM – 9:00 AM) ──────────
function getISTTime() {
  const now = new Date();
  // IST = UTC + 5:30
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const ist = new Date(utc + (5.5 * 3600000));
  return { h: ist.getHours(), m: ist.getMinutes(), full: ist };
}

function isAfterCutoff() {
  const { h, m } = getISTTime();
  // After 8:30 PM (20:30) OR before 9:00 AM (09:00)
  if (h > 20) return true;
  if (h === 20 && m >= 30) return true;
  if (h < 9) return true;
  return false;
}

function getScheduledDeliveryText() {
  const { h, m, full } = getISTTime();
  const tomorrow = new Date(full);
  tomorrow.setDate(tomorrow.getDate() + 1);
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dayName = days[tomorrow.getDay()];
  const dateStr = `${tomorrow.getDate()} ${months[tomorrow.getMonth()]}`;
  return { dayName, dateStr };
}

function renderScheduleNotice() {
  const el = document.getElementById('schedule-notice');
  if (!el) return;

  const late = isAfterCutoff();

  if (late) {
    const { dayName, dateStr } = getScheduledDeliveryText();
    el.className = 'schedule-notice scheduled';
    el.innerHTML = `
      <span class="schedule-icon">📅</span>
      <div class="schedule-text">
        <h4>Order Scheduled for Tomorrow</h4>
        <p>Orders placed after 8:30 PM or before 9:00 AM (IST) are automatically scheduled.<br>
        Your order will be dispatched on <strong>${dayName}, ${dateStr}</strong> after 9:00 AM.</p>
        <span class="schedule-tag">🕘 Dispatch: ${dateStr} after 9:00 AM IST</span>
      </div>`;
    // Store scheduled flag for order
    window._orderScheduled = true;
    window._scheduledDate = `${dayName}, ${dateStr}`;
  } else {
    const { h, m } = getISTTime();
    const cutoffH = 20, cutoffM = 30;
    const totalMinsLeft = (cutoffH * 60 + cutoffM) - (h * 60 + m);
    const hLeft = Math.floor(totalMinsLeft / 60);
    const mLeft = totalMinsLeft % 60;
    const timeLeft = hLeft > 0 ? `${hLeft}h ${mLeft}m` : `${mLeft} min`;

    el.className = 'schedule-notice';
    el.innerHTML = `
      <span class="schedule-icon">⚡</span>
      <div class="schedule-text">
        <h4>Order Now for Same-Day Processing</h4>
        <p>Place your order before <strong>8:30 PM IST</strong> for same-day processing.
        You have <strong>${timeLeft}</strong> left!</p>
        <span class="schedule-tag">⏰ Cutoff: 8:30 PM IST Today</span>
      </div>`;
    window._orderScheduled = false;
  }
}

document.addEventListener('DOMContentLoaded', renderScheduleNotice);
</script>
